      - d: "S3 is immune to path traversal because object storage has no concept of parent directories"
    answer: "b"
    explanation: "While S3 itself treats keys as opaque strings (there's no real directory hierarchy), the vulnerability lies in the application layer or SDK. If the application or AWS SDK normalizes the path (resolving ../) before constructing the S3 API request, `filename=../../other-user-id/secret.pdf` could access another user's files. Option A incorrectly describes S3 as having real directories. Option C is wrong — IAM policies can use key prefixes, but the traversal might stay within the allowed prefix. Option D is wrong — the application layer can still be tricked even if S3 itself doesn't traverse."

  - id: pt-010
    topic: path-traversal
    type: tricky-concept
    difficulty: advanced
    question: "On Windows, which of these file path quirks can be exploited for path traversal or access control bypass?"
    options:
      - a: "Alternate Data Streams (ADS): `file.txt::$DATA` accesses the default stream, potentially bypassing extension checks that don't account for the stream suffix"
      - b: "8.3 short filenames: `PROGRA~1` is equivalent to `Program Files`, potentially bypassing path-based allowlists"
      - c: "Trailing dots and spaces: `file.txt...` is equivalent to `file.txt` on Windows NTFS, bypassing extension filters"
      - d: "All of the above — Windows has multiple path normalization quirks that can bypass security checks"
    answer: "d"
    explanation: "Windows has numerous path normalization behaviors that create security mismatches. ADS (::$DATA) can bypass extension checks. Short 8.3 filenames provide alternative names for long paths. Trailing dots and spaces are silently stripped by NTFS. Additionally, Windows is case-insensitive and treats both `/` and `\\` as path separators. All of these can bypass path-based security checks that don't account for Windows normalization."

  - id: pt-011
    topic: path-traversal
    type: attack-chain
    difficulty: intermediate
    question: "You've discovered a path traversal vulnerability that allows reading arbitrary files from a Linux web server. You can read any file the web server process can access. What file should you read FIRST for maximum impact?"
    options:
      - a: "`/etc/passwd` — it reveals all system usernames which can be used for SSH brute-forcing"
      - b: "The application's configuration file (e.g., `/var/www/app/config/database.yml`) — it likely contains database credentials, API keys, and other secrets"
      - c: "`/etc/shadow` — it contains password hashes that can be cracked offline"
      - d: "`/proc/self/environ` — it reveals environment variables of the running process, which often contain secrets, database URLs, and API keys"
    answer: "d"
    explanation: "/proc/self/environ exposes all environment variables of the web server process, which in modern applications typically contains database URLs, API keys, JWT secrets, cloud credentials, and other sensitive configuration. This is the highest-value single file for immediate credential harvest. Option A is low value — /etc/passwd rarely leads to direct exploitation. Option B requires guessing the application's path and config file name. Option C is almost never readable by the www-data user (requires root). Option D gives immediate access to runtime secrets without guessing file paths."

  - id: pt-012
    topic: path-traversal
    type: defense-bypass
    difficulty: advanced
    question: "A Java application uses this validation:\n```java\nString canonical = new File(BASE_DIR, userInput).getCanonicalPath();\nif (!canonical.startsWith(BASE_DIR)) throw new SecurityException();\n```\nA TOCTOU (Time-of-Check-Time-of-Use) race condition exists. How?"
    options:
      - a: "Between canonicalization and use, an attacker with local access could replace a directory in the path with a symlink pointing outside BASE_DIR"
      - b: "The canonical path changes if another thread modifies the BASE_DIR contents between the check and the file read"
      - c: "Java's garbage collector might clear the canonical string from memory between check and use"
      - d: "The getCanonicalPath() result is cached and may not reflect file system changes from concurrent requests"
    answer: "a"
    explanation: "If an attacker has any ability to modify the file system (e.g., via a file upload feature), they can exploit the window between getCanonicalPath() (check) and the actual file read (use). During this window, they replace a directory or file with a symlink pointing outside BASE_DIR. The check passes against the original path, but the subsequent read follows the symlink. Option B is wrong — modifications to BASE_DIR contents don't change other files' canonical paths. Option C is wrong — Java doesn't GC referenced strings. Option D is partially correct that canonicalization results can be stale, but the specific attack vector is symlink replacement, not caching."

  # ============================================================
  # INFORMATION DISCLOSURE (12 questions)
  # ============================================================

  - id: info-001
    topic: information-disclosure
    type: scenario
    difficulty: intermediate
    question: "You discover that `/.git/HEAD` returns `ref: refs/heads/main` on a production web server. What is the MOST impactful thing you can do?"
    options:
      - a: "Read the branch name — knowing it's 'main' vs 'master' reveals the organization's Git practices"
      - b: "Reconstruct the entire source code repository by downloading Git objects from `.git/objects/` and parsing the Git data structures"
      - c: "Identify the last developer who pushed by reading `.git/COMMIT_EDITMSG`"
      - d: "Find deployment credentials in `.git/config` which might contain remote URLs with embedded tokens"
    answer: "b"
    explanation: "An exposed .git directory allows full repository reconstruction using tools like git-dumper. You can download all objects (commits, trees, blobs) and reconstruct the complete source code, including full commit history, which may contain accidentally-committed secrets, database credentials, API keys, and internal documentation. Option A is trivial information. Option C reveals minor information. Option D is possible and useful, but the full source code (Option B) is strictly more impactful — it includes the config file AND everything else."

  - id: info-002
    topic: information-disclosure
    type: tricky-concept
    difficulty: advanced
    question: "A site returns CORS headers `Access-Control-Allow-Origin: *` on its API endpoints. The site also uses cookie-based authentication. Why is this actually NOT a vulnerability?"
    options:
      - a: "It IS a vulnerability — any site can read API responses and steal authenticated data"
      - b: "Browsers refuse to send credentials (cookies) when the CORS response is `*` — the wildcard and `Access-Control-Allow-Credentials: true` are mutually exclusive"
      - c: "The wildcard only allows GET requests — POST and PUT are still blocked by CORS preflight"
      - d: "The wildcard only applies to the response headers, not the response body — so the data itself is still protected"
    answer: "b"
    explanation: "The CORS specification explicitly forbids combining `Access-Control-Allow-Origin: *` with `Access-Control-Allow-Credentials: true`. Browsers enforce this — when ACAO is `*`, cookies are not sent, so the API requests are unauthenticated. For credentials to be included, the server must echo the specific requesting origin. Option A would be true IF cookies were sent, but they aren't. Option C is wrong — the wildcard applies to all HTTP methods (after preflight if needed). Option D is wrong — ACAO controls access to the entire response including the body."

  - id: info-003
    topic: information-disclosure
    type: scenario
    difficulty: advanced
    question: "A web application returns detailed stack traces for 500 errors in production. Beyond embarrassment, what is the MOST actionable information an attacker gains?"
    options:
      - a: "The programming language and framework version — enabling targeted CVE exploitation"
      - b: "Full file system paths, internal function names, database query structures, and third-party library versions — providing a detailed map for further attacks"
      - c: "The server administrator's name from code comments embedded in the stack trace"
      - d: "Memory addresses that can be used for buffer overflow attacks against the web application"
    answer: "b"
    explanation: "Stack traces reveal a rich combination of actionable intelligence: absolute file paths (enabling path traversal with precision), SQL queries (revealing table/column names for SQL injection), framework and library versions (enabling known-CVE targeting), internal API endpoint paths (revealing hidden functionality), and class/function names (revealing business logic). Option A is true but too narrow — it's just one element of the broader disclosure. Option C is unlikely and low-value. Option D is wrong — web application memory addresses from managed languages (Java, Python, PHP) aren't useful for traditional buffer overflows."

  - id: info-004
    topic: information-disclosure
    type: defense-bypass
    difficulty: advanced
    question: "A site's CORS policy dynamically reflects the Origin header into Access-Control-Allow-Origin but only for whitelisted domains. The whitelist check uses: `origin.endsWith('.example.com')`. How can an attacker bypass this?"
    options:
      - a: "Register the domain `evilexample.com` — the endsWith check will match because it ends with `example.com`"
      - b: "Use a subdomain like `evil.example.com` — only registered subdomains should be allowed"
      - c: "Send an Origin header with null value — some implementations whitelist the null origin"
      - d: "Both A and C are viable attacks against this implementation"
    answer: "d"
    explanation: "Option A works because `endsWith('.example.com')` also matches `notexample.com` — the attacker registers `attackerexample.com` or any domain ending in `example.com`. Option C is a separate bypass — the `null` origin (sent by sandboxed iframes and redirects) is often accidentally whitelisted. Option B describes a legitimate subdomain which might or might not be authorized, but it's not an attack. The correct fix for A is to check `origin === 'https://example.com' || origin.endsWith('.example.com')` AND also match the scheme and ensure the dot is there."

  - id: info-005
    topic: information-disclosure
    type: tricky-concept
    difficulty: intermediate
    question: "A login form responds with 'Invalid username' for non-existent users and 'Invalid password' for wrong passwords on existing accounts. The developer changes both to 'Invalid credentials'. Is the enumeration problem fully solved?"
    options:
      - a: "Yes — with identical messages, there's no way to distinguish between invalid usernames and wrong passwords"
      - b: "No — the registration page likely still reveals whether an email is taken, and password reset may also differ"
      - c: "No — but only because response times may differ (database lookup for existing users takes longer)"
      - d: "Both B and C — enumeration must be prevented consistently across ALL features and side channels"
    answer: "d"
    explanation: "User enumeration must be addressed holistically. Even with identical login error messages, attackers can enumerate via: registration ('email already exists'), password reset (different behavior for valid/invalid emails), response time differences (bcrypt comparison only runs for existing users), and even HTTP response size differences. Option A is wrong because it only addresses one of many channels. Option B identifies feature-level leaks but misses timing. Option C identifies timing but misses other features. Only Option D captures the full scope."

  - id: info-006
    topic: information-disclosure
    type: scenario
    difficulty: advanced
    question: "You discover a timing side-channel: a search API takes 2ms for zero results but 50ms+ for results that exist but are access-controlled (returning 'Access Denied'). What can you infer and exploit?"
    options:
      - a: "Nothing useful — the timing only tells you the database is slower under load"
      - b: "You can enumerate which search terms match restricted resources by measuring response times, even though you can't see the resources themselves"
      - c: "The timing difference reveals the database password through a cache-timing attack"
      - d: "You can infer the number of restricted results based on the exact response time, but not their content"
    answer: "b"
    explanation: "The timing difference reveals whether restricted resources matching your query EXIST, even though you can't access them. This is a boolean information leak — you now know which search terms have hits in the restricted dataset. Depending on the application, this could reveal the existence of confidential projects, user accounts, financial records, etc. Option A dismisses a real side-channel. Option C fabricates a nonsensical attack. Option D partially captures the issue but overstates the precision — response time might roughly correlate with result count, but the key insight is the binary exists/doesn't-exist distinction."

  - id: info-007
    topic: information-disclosure
    type: spot-the-vuln
    difficulty: intermediate
    question: "An API returns user profiles. For the authenticated user: `{\"id\": 1, \"name\": \"Alice\", \"email\": \"a@b.com\", \"role\": \"user\"}`. For other users: `{\"id\": 2, \"name\": \"Bob\"}`. An attacker notices that requesting a specific admin user returns: `{\"id\": 99, \"name\": \"Admin\"}`. What information is disclosed?"
    options:
      - a: "The admin's name is disclosed, which enables targeted social engineering"
      - b: "The sequential ID (99) reveals there are at least 99 users, enabling IDOR enumeration of all user IDs"
      - c: "The different response structure (2 fields vs 4 fields) confirms user 99 exists and the requester doesn't have access — but no sensitive data is leaked"
      - d: "The presence of a response at all (instead of 404) confirms user ID 99 exists, AND the response structure is the same for any non-self user, so the admin role isn't actually disclosed"
    answer: "d"
    explanation: "The question tests careful observation. The 'other user' response always returns just id and name, whether the target is a regular user or admin. No role information is actually leaked — the attacker can confirm the user EXISTS but can't determine they're an admin from this response alone. Option A identifies the name but not the role. Option B is a valid general concern about sequential IDs but isn't the MOST relevant finding here. Option C is closest but claims 'no sensitive data' which overlooks that confirming user existence is itself information disclosure."

  - id: info-008
    topic: information-disclosure
    type: defense-bypass
    difficulty: advanced
    question: "A developer implements custom error handling that catches all exceptions and returns a generic 500 response. However, the application still leaks information. What is the MOST likely remaining channel?"
    options:
      - a: "The response time differs between different exception types — a database timeout takes longer than a validation error"
      - b: "The generic error page includes a support reference number that encodes the error type"
      - c: "HTTP response headers from the framework still include Server, X-Powered-By, and version information"
      - d: "All of the above represent distinct information disclosure channels that survive generic error handling"
    answer: "d"
    explanation: "Generic error pages address only the response body. Option A: Timing side-channels leak which code path was taken (database error vs validation vs authentication). Option B: Support reference numbers often encode error type, timestamp, or server ID. Option C: Response headers commonly expose server software (Apache/Nginx), framework (X-Powered-By: Express), and versions. A thorough approach must address body, headers, timing, and any metadata simultaneously."

  - id: info-009
    topic: information-disclosure
    type: scenario
    difficulty: intermediate
    question: "You find that `robots.txt` on a corporate site contains:\n```\nDisallow: /admin/\nDisallow: /internal-api/\nDisallow: /jenkins/\nDisallow: /backup/db-dump/\n```\nWhat is the security impact?"
    options:
      - a: "None — robots.txt prevents search engine indexing, which actually improves security by hiding these paths"
      - b: "It creates a roadmap of sensitive paths for attackers — robots.txt is publicly readable and meant for search engines, not access control"
      - c: "Moderate — the paths are disclosed but can't be accessed without proper authentication"
      - d: "Critical — robots.txt entries are automatically accessible to anyone who reads the file"
    answer: "b"
    explanation: "robots.txt is publicly accessible and intended only as a voluntary directive for search engine crawlers. It provides zero access control. By listing sensitive paths, the organization hands attackers a prioritized list of targets to probe. Even if authentication is required, the attacker now knows exactly where to look instead of guessing. Option A is dangerous thinking — hiding from search engines is not security. Option C understates the risk by assuming authentication works everywhere. Option D overstates it — the paths are disclosed but may still require authentication."

  - id: info-010
    topic: information-disclosure
    type: tricky-concept
    difficulty: advanced
    question: "A REST API returns 403 Forbidden for resources that exist but you can't access, and 404 Not Found for resources that don't exist. Why is this a vulnerability?"
    options:
      - a: "It's not a vulnerability — different status codes for different conditions is proper REST API design"
      - b: "It enables resource enumeration — an attacker can determine which resource IDs exist by distinguishing 403 from 404, even without accessing the resources"
      - c: "The 403 response might include more information than the 404 in its error body"
      - d: "It enables brute-force attacks because 403 responses are smaller and faster to process than 404s"
    answer: "b"
    explanation: "Distinguishing 'exists but unauthorized' (403) from 'doesn't exist' (404) leaks the existence of resources. An attacker can enumerate all valid resource IDs, which is the first step in many attack chains. The secure approach is to return 404 for all unauthorized access — pretend the resource doesn't exist. Option A reflects correct REST semantics but ignores the security implication. Option C is a secondary concern. Option D mischaracterizes the risk — the issue is enumeration, not brute-force optimization."

  - id: info-011
    topic: information-disclosure
    type: attack-chain
    difficulty: intermediate
    question: "You discover a verbose error message that reveals: `ConnectionString: Server=db.internal.corp;Database=AppDB;User=sa;Password=Pr0d_Pw!`. What is the MOST impactful immediate action?"
    options:
      - a: "Try these credentials on the application's login page — developers often reuse database passwords for admin accounts"
      - b: "Attempt direct database connection if the database port is exposed, since the 'sa' user typically has full SQL Server sysadmin privileges"
      - c: "Search for the internal hostname db.internal.corp in DNS to find the database server's IP for port scanning"
      - d: "Report the finding immediately since the connection string exposure is the vulnerability"
    answer: "b"
    explanation: "The 'sa' (system administrator) user is SQL Server's built-in superuser with complete control over the database server. Direct connection to the database would give full access to all databases, ability to execute OS commands via xp_cmdshell, read/write the file system, and potentially pivot to other systems. Option A is creative but lower impact than direct DB access. Option C is useful reconnaissance but indirect. Option D is appropriate for a pentest report but the question asks about immediate action for maximum impact."

  - id: info-012
    topic: information-disclosure
    type: defense-bypass
    difficulty: advanced
    question: "A site prevents directory listing on its web server. You suspect a backup file exists but don't know its name. Which technique is MOST effective for discovery?"
    options:
      - a: "Try common backup file patterns: `backup.sql`, `backup.zip`, `db.sql.gz`, `site.tar.gz`, `.env.bak`"
      - b: "Use the Wayback Machine (web.archive.org) to find historically-listed directory contents that may reference backup files"
      - c: "Brute-force with a comprehensive wordlist using tools like dirbuster or feroxbuster that test thousands of common file/path patterns"
      - d: "All of these are complementary techniques — effective discovery uses multiple approaches because each catches files the others miss"
    answer: "d"
    explanation: "No single technique reliably finds all hidden files. Common patterns (Option A) catch predictable names. Wayback Machine (Option B) reveals files that were once public. Wordlist brute-forcing (Option C) systematically tests thousands of names. In practice, security professionals use all three plus additional methods (Google dorking, checking .git/config for references, examining JavaScript for API paths, etc.). Each technique has blind spots that the others cover."

  # ============================================================
  # CSRF (6 questions)
  # ============================================================

  - id: csrf-001
    topic: csrf
    type: tricky-concept
    difficulty: advanced
    question: "A site sets `SameSite=Lax` on its session cookie (the current browser default). Under which scenario can CSRF STILL succeed?"
    options:
      - a: "A top-level GET request navigation — Lax allows cookies on top-level GET navigations, so CSRF works if the state-changing action accepts GET requests"
      - b: "Any POST request from another site — SameSite=Lax doesn't restrict POST requests"
      - c: "Subresource requests (img, script, iframe) from another site — Lax allows these"
      - d: "No scenario — SameSite=Lax prevents all forms of cross-site request forgery"
    answer: "a"
    explanation: "SameSite=Lax allows cookies on top-level navigations (clicking a link that navigates the full page) using safe HTTP methods (GET). If a state-changing endpoint accepts GET requests (e.g., `/transfer?to=attacker&amount=1000`), an attacker can forge this as a simple link. Option B is wrong — Lax blocks cookies on cross-site POST requests. Option C is wrong — Lax blocks cookies on subresource requests (images, scripts, iframes). Option D is wrong because of the GET navigation exception."

  - id: csrf-002
    topic: csrf
    type: defense-bypass
    difficulty: advanced
    question: "A REST API checks the `Content-Type: application/json` header and only processes JSON requests. The developer argues CSRF is impossible because HTML forms can't send JSON. What technique bypasses this?"
    options:
      - a: "Use `fetch()` from the attacker's page with `Content-Type: application/json` — the CORS preflight will block it but the simple request still goes through"
      - b: "Use `navigator.sendBeacon()` with a Blob having type `application/json` — some browsers send this without a preflight"
      - c: "Use a form with `enctype='text/plain'` and craft the form field name/value to look like valid JSON: `{\"amount\":1000,\"to\":\"attacker\"//}`"
      - d: "Use an XMLHttpRequest with `withCredentials: true` and set the Content-Type — the browser allows this for same-origin requests"
    answer: "c"
    explanation: "HTML forms with `enctype='text/plain'` send the body as `name=value`. By carefully crafting the name to be `{\"amount\":1000,\"to\":\"attacker\"//` and the value to be `}`, the resulting body is valid-looking JSON: `{\"amount\":1000,\"to\":\"attacker\"//=}`. The `//` comments out the `=` in JSON parsers that support comments, or the API may be lenient. Option A is wrong — fetch() with a non-simple Content-Type triggers a preflight which WOULD be blocked. Option B is unreliable and browser-dependent. Option D is wrong — XMLHttpRequest from a cross-origin page still triggers CORS."

  - id: csrf-003
    topic: csrf
    type: scenario
    difficulty: intermediate
    question: "A site includes the CSRF token in the URL of action links: `https://bank.com/transfer?csrf_token=abc123&to=alice&amount=100`. What is the security problem compared to putting the token in a hidden form field?"
    options:
      - a: "No difference — both locations provide equal CSRF protection"
      - b: "URL tokens leak via the Referer header when the page contains links to external sites, via browser history, via server access logs, and via proxy logs"
      - c: "URL tokens are vulnerable to XSS while form tokens are not"
      - d: "URL tokens expire faster because browsers cache URLs differently"
    answer: "b"
    explanation: "Tokens in URLs leak through multiple channels: the Referer/Referrer header sent with any subsequent request (including to third-party resources like analytics), browser history (visible to other users of the same machine), server access logs (readable by anyone with log access), and proxy/CDN logs. Hidden form fields avoid all of these leaks. Option A ignores significant leakage vectors. Option C is wrong — both are equally vulnerable to XSS (XSS can read form fields too). Option D fabricates non-existent cache behavior."

  - id: csrf-004
    topic: csrf
    type: tricky-concept
    difficulty: advanced
    question: "What is 'login CSRF' and why is it dangerous, even though the attacker isn't accessing the victim's account?"
    options:
      - a: "The attacker force-logs the victim into the ATTACKER'S account — the victim then enters sensitive data (credit cards, personal info) thinking it's their own account, but it's actually saved to the attacker's account"
      - b: "Login CSRF steals the victim's credentials by presenting a fake login form on the legitimate domain"
      - c: "Login CSRF exploits the login endpoint to brute-force credentials by automating login attempts through the victim's browser"
      - d: "Login CSRF is a misnomer — the login page can't be CSRF'd because there's no session to ride"
    answer: "a"
    explanation: "Login CSRF is a subtle and underestimated attack. The attacker crafts a form that submits the ATTACKER'S credentials to the victim's browser, logging them into the attacker's account. The victim, believing they're in their own account, enters sensitive information (payment details, addresses, personal data), or performs searches that reveal private interests. All this activity is recorded in the attacker's account. Option B describes phishing, not CSRF. Option C describes brute-force, not CSRF. Option D is wrong — CSRF doesn't require an existing session; it creates one."

  - id: csrf-005
    topic: csrf
    type: defense-bypass
    difficulty: advanced
    question: "A site validates CSRF tokens but the check is only enforced when a token is PRESENT. If the token parameter is completely omitted from the request, the server skips validation. How can an attacker exploit this?"
    options:
      - a: "Submit the form without the CSRF token field — the server skips validation and processes the request"
      - b: "This isn't exploitable — browsers always send all form fields, so the token will always be present"
      - c: "The attacker needs to find an XSS vulnerability to remove the token from the DOM before form submission"
      - d: "Send the CSRF token with an empty value — the server will see it as present but invalid and reject it"
    answer: "a"
    explanation: "The attacker crafts their own HTML form on their malicious site that simply doesn't include the CSRF token field at all. When the victim's browser submits this form to the target site, the token parameter is absent. The server sees no token and skips validation entirely, processing the state-changing request. Option B is wrong — the attacker controls which fields their malicious form includes. Option C is unnecessary — the attacker doesn't need to modify the legitimate form. Option D describes the opposite of what we want — we want to OMIT the parameter, not send it empty."

  - id: csrf-006
    topic: csrf
    type: spot-the-vuln
    difficulty: intermediate
    question: "A developer implements CSRF protection by checking that the `Referer` header matches the application's domain. Under what common condition does this defense fail?"
    options:
      - a: "Privacy extensions and some browser settings strip the Referer header entirely — if the server allows requests with no Referer, the protection is bypassed"
      - b: "The Referer header is spoofable by JavaScript — an attacker can set any value using XMLHttpRequest"
      - c: "The Referer header is only sent for GET requests, leaving POST requests unprotected"
      - d: "HTTPS to HTTPS requests never include a Referer header due to security restrictions"
    answer: "a"
    explanation: "Many users, privacy tools, and corporate proxies strip Referer headers. If the application falls back to allowing requests without a Referer (to avoid breaking functionality for these users), an attacker can use techniques like `<meta name='referrer' content='no-referrer'>` or certain redirect chains to suppress the Referer, bypassing the check. Option B is wrong — browsers prevent JavaScript from setting the Referer header. Option C is wrong — Referer is sent for POST requests too. Option D is wrong — HTTPS-to-HTTPS requests do include Referer by default."

  # ============================================================
  # SSRF (6 questions)
  # ============================================================

  - id: ssrf-001
    topic: ssrf
    type: defense-bypass
    difficulty: advanced
    question: "A server-side URL fetcher blocks requests to private IP ranges (10.x, 172.16-31.x, 192.168.x, 127.x). Which technique MOST reliably bypasses this?"
    options:
      - a: "Use DNS rebinding — register a domain that first resolves to a public IP (passing validation) then resolves to 127.0.0.1 (when the actual connection is made)"
      - b: "Use IPv6 representations of localhost: `http://[::1]/` — many filters only check IPv4 ranges"
      - c: "Use decimal IP representation: `http://2130706433/` (decimal for 127.0.0.1) — the filter only checks dotted-quad notation"
      - d: "All of these bypass different implementations of IP-based SSRF filters"
    answer: "d"
    explanation: "Each technique bypasses a different weakness in IP filtering. DNS rebinding exploits the gap between DNS resolution for validation and for connection. IPv6 bypass works when filters only check IPv4. Decimal/octal/hex IP representations bypass string-matching filters. Other techniques include: URL redirection (pointing to a public URL that 302-redirects to an internal IP), cloud metadata endpoints (169.254.169.254), and URL parser inconsistencies. Robust SSRF prevention requires checking the resolved IP at connection time, handling all IP formats, and blocking DNS rebinding."

  - id: ssrf-002
    topic: ssrf
    type: scenario
    difficulty: advanced
    question: "You've found SSRF on an AWS EC2 instance. You can make the server fetch arbitrary URLs. What is the MOST impactful first request?"
    options:
      - a: "`http://169.254.169.254/latest/meta-data/iam/security-credentials/` — this reveals the IAM role name, and then you can fetch temporary AWS credentials"
      - b: "`http://localhost:5432/` — test if PostgreSQL is running locally with no authentication"
      - c: "`http://169.254.169.254/latest/user-data/` — this often contains initialization scripts with hardcoded credentials"
      - d: "`http://169.254.169.254/latest/meta-data/public-keys/` — this reveals SSH keys for accessing the instance directly"
    answer: "a"
    explanation: "The Instance Metadata Service (IMDS) at 169.254.169.254 is the highest-value SSRF target on AWS. Fetching the IAM security credentials path gives you temporary AWS access keys (Access Key ID, Secret Key, and Session Token) for the instance's IAM role. These credentials often have broad permissions (S3 access, DynamoDB, etc.) and provide access far beyond the single EC2 instance. Option B is useful but limited to the single host. Option C can contain credentials but user-data isn't always present or sensitive. Option D is wrong — public keys are public by definition and don't enable access."

  - id: ssrf-003
    topic: ssrf
    type: tricky-concept
    difficulty: advanced
    question: "AWS introduced IMDSv2, which requires a PUT request to get a session token before metadata access. How does this mitigate SSRF-based credential theft?"
    options:
      - a: "IMDSv2 encrypts all metadata responses, so even if fetched via SSRF, the data is unreadable"
      - b: "The PUT request requirement blocks most SSRF vectors because common SSRF sinks (img tags, URL fetch libraries in redirect-following mode) only perform GET requests and can't send the required custom header"
      - c: "IMDSv2 requires the request to originate from the instance's primary network interface, which SSRF can't spoof"
      - d: "IMDSv2 adds a CAPTCHA to metadata requests that automated SSRF can't solve"
    answer: "b"
    explanation: "IMDSv2 requires a PUT request with a custom header (X-aws-ec2-metadata-token-ttl-seconds) to obtain a session token, then a GET request with that token in a header. Most SSRF vulnerabilities involve URL fetchers that only do GET requests and can't set custom headers. Additionally, the token PUT request has a hop-limit of 1 (TTL=1 at the IP level), preventing it from leaving the instance. Option A is wrong — metadata isn't encrypted. Option C isn't quite right — the hop-limit is IP-level, not interface-level. Option D is fabricated."

  - id: ssrf-004
    topic: ssrf
    type: defense-bypass
    difficulty: advanced
    question: "An SSRF filter validates that the URL hostname resolves to a public IP address before making the request. The server then makes the actual HTTP request to the validated URL. What is this vulnerable to?"
    options:
      - a: "DNS rebinding — the hostname resolves to a public IP during validation but to an internal IP during the actual request, exploiting the time gap between DNS lookups"
      - b: "Nothing — validating the resolved IP is the correct defense against SSRF"
      - c: "URL encoding bypass — the hostname can be encoded differently for validation vs the HTTP library"
      - d: "TLS certificate confusion — the server will connect to any IP that presents a valid certificate for the hostname"
    answer: "a"
    explanation: "This is a classic TOCTOU (Time-of-Check-Time-of-Use) vulnerability via DNS rebinding. The attacker configures their DNS server to respond with a public IP for the first lookup (validation passes) and an internal IP for the second lookup (the actual HTTP request goes to the internal network). DNS TTL is set to 0 or very low to ensure separate lookups. Option B describes the right idea but misses the rebinding flaw — you must validate the IP at CONNECTION time, not resolution time. Option C is wrong — the URL is the same for both operations. Option D is wrong — TLS certificate validation doesn't affect which IP is connected to."

  - id: ssrf-005
    topic: ssrf
    type: scenario
    difficulty: intermediate
    question: "An application allows users to import data from a URL. The server validates that the URL scheme is HTTP or HTTPS. On a server running an older version of curl/libcurl as the fetch library, what alternative scheme could bypass this AND enable reading local files?"
    options:
      - a: "`gopher://` — this protocol can craft arbitrary TCP packets, enabling interaction with internal services using their native protocols"
      - b: "`ftp://localhost/etc/passwd` — FTP can read local files and most URL fetchers support FTP"
      - c: "`file:///etc/passwd` — this scheme reads local files directly without any network request"
      - d: "The HTTP/HTTPS scheme validation is sufficient — no other schemes can bypass it"
    answer: "a"
    explanation: "The question states the scheme is validated to be HTTP or HTTPS, so file:// (Option C) would be blocked. However, the answer asks about bypass given the scheme check. Re-reading: if the check only allows HTTP/HTTPS, gopher:// would also be blocked. The key insight is that HTTP redirects can bypass scheme validation — the server validates the INITIAL URL as HTTPS, but following a redirect to `gopher://` happens after validation. Gopher is particularly dangerous because it can craft raw TCP traffic to interact with Redis, SMTP, and other internal services. Option B: FTP would be blocked by the scheme check. Option D underestimates redirect-based bypasses."

  - id: ssrf-006
    topic: ssrf
    type: attack-chain
    difficulty: advanced
    question: "You've confirmed SSRF that can reach internal services. Port scanning reveals Redis on 6379 (no authentication). What is the MOST impactful attack using SSRF to interact with Redis?"
    options:
      - a: "Use Redis SLAVEOF to replicate data from an external Redis instance you control, injecting malicious data"
      - b: "Use Redis CONFIG SET and SET commands (via gopher:// or HTTP request smuggling) to write a cron job or SSH key to disk, achieving remote code execution"
      - c: "Dump all Redis keys to find cached session tokens and API keys"
      - d: "Use Redis FLUSHALL to delete all cached data, causing a denial of service"
    answer: "b"
    explanation: "Redis CONFIG SET allows changing the database dump location (dir) and filename (dbfilename). By writing specially crafted data to Redis and saving it to /var/spool/cron/crontabs/root or /root/.ssh/authorized_keys, you achieve persistent remote code execution. This is a well-known Redis exploitation technique. Option A is creative but more complex and less reliable. Option C provides information but doesn't escalate access as much as code execution. Option D is destructive but far less impactful than gaining code execution."

  # ============================================================
  # XXE (6 questions)
  # ============================================================

  - id: xxe-001
    topic: xxe
    type: tricky-concept
    difficulty: advanced
    question: "A developer disables external entities in the XML parser but does NOT disable DTD processing entirely. What attack is STILL possible?"
    options:
      - a: "Billion Laughs (XML bomb) — internal entity expansion can cause exponential memory consumption using nested entity definitions"
      - b: "External entity injection — disabling 'external entities' is just a label and doesn't actually prevent SYSTEM entity resolution"
      - c: "XPath injection — DTD processing enables injection into XPath queries embedded in the XML"
      - d: "XML signature wrapping — DTDs allow redefining the signed content after signature verification"
    answer: "a"
    explanation: "The Billion Laughs attack uses only INTERNAL entity definitions (no external resources needed). Entity `a` is defined as 10 repetitions of entity `b`, which is 10 repetitions of entity `c`, and so on. Expanding the top-level entity creates exponential growth — `lol9` expands to a billion `lol` strings, consuming gigabytes of memory. Disabling external entities doesn't prevent this because all entities are internal. Option B is wrong — properly disabling external entities does prevent SYSTEM entity resolution. Option C conflates two unrelated vulnerability classes. Option D describes a different attack against XML signatures."

  - id: xxe-002
    topic: xxe
    type: scenario
    difficulty: advanced
    question: "You've confirmed XXE in a Java application, but the entity expansion doesn't appear in any HTTP response (blind XXE). How can you extract the contents of /etc/passwd?"
    options:
      - a: "Use a parameter entity to load an external DTD from your server that constructs a URL containing the file contents, then triggers an HTTP request to your server with the data embedded in the URL"
      - b: "Use error-based XXE — define an entity that tries to load a file:// URI containing the target file's contents as the filename, causing an error message that includes the data"
      - c: "Use FTP-based exfiltration — define an entity that connects to your FTP server and sends the file contents as the login username"
      - d: "All three are valid blind XXE extraction techniques"
    answer: "d"
    explanation: "All three are established blind XXE techniques. Option A (OOB via HTTP): The external DTD defines a parameter entity using the file:// protocol, then constructs a URL like `http://attacker.com/?data=FILE_CONTENTS`. Option B (error-based): Triggering a parsing error that includes the file contents in the error message. Option C (FTP exfiltration): FTP is useful because it can exfiltrate multi-line file contents that would break HTTP URLs. Each technique has tradeoffs — HTTP is simplest, FTP handles newlines, error-based doesn't require outbound connections."

  - id: xxe-003
    topic: xxe
    type: defense-bypass
    difficulty: advanced
    question: "An application doesn't accept XML input directly, but it processes DOCX file uploads. How can XXE still be exploited?"
    options:
      - a: "DOCX files are ZIP archives containing XML files — injecting XXE payloads into the internal XML documents (like word/document.xml) can trigger XXE when the server parses them"
      - b: "DOCX files contain embedded macros that can execute XXE payloads when the server opens them"
      - c: "The DOCX file extension can be renamed to .xml and the server will process it as raw XML"
      - d: "DOCX files contain a manifest.xml that the server reads before any security filtering, allowing XXE in the manifest"
    answer: "a"
    explanation: "DOCX (and XLSX, PPTX, ODT) files are ZIP archives containing multiple XML files. If the server-side library parses these XML files without disabling external entities, XXE payloads embedded in any of the internal XML documents will be processed. This is a commonly overlooked XXE vector because developers don't think of document uploads as XML input. Option B confuses XXE with macro-based attacks — they're different vulnerability classes. Option C is wrong — the server uses the Content-Type/magic bytes, not just the extension. Option D fabricates a specific manifest behavior."

  - id: xxe-004
    topic: xxe
    type: tricky-concept
    difficulty: advanced
    question: "Why can't you directly use an external entity to read a PHP file (like `/var/www/index.php`) via XXE and have its full contents reflected in the response?"
    options:
      - a: "PHP files are executable, and the XML parser executes them instead of reading their contents"
      - b: "PHP files contain angle brackets (<, >) and other characters that are invalid in XML entity values, causing the XML parser to throw an error when expanding the entity"
      - c: "PHP files are binary and XML entities can only contain text content"
      - d: "The web server blocks direct file:// access to PHP files to prevent source code disclosure"
    answer: "b"
    explanation: "XML has strict parsing rules. When a file containing `<?php` or `<html>` is expanded as an entity value, the XML parser treats the `<` as the start of a new XML element, breaking the XML structure and causing a parse error. This is why blind XXE + OOB exfiltration (base64-encoding the file via PHP filters or using CDATA wrapping via parameter entities) is needed for files with XML-special characters. Option A is wrong — the XML parser reads files, it doesn't execute them. Option C is wrong — PHP files are text. Option D is wrong — file:// access is OS-level, not web-server-level."

  - id: xxe-005
    topic: xxe
    type: spot-the-vuln
    difficulty: intermediate
    question: "Consider this Python code that parses user-uploaded SVG files:\n```python\nfrom lxml import etree\ntree = etree.parse(uploaded_file)\n```\nWhat vulnerability exists and why?"
    options:
      - a: "XXE — lxml's etree.parse() processes external entities and DTDs by default, and SVG files are XML that can contain DTD declarations"
      - b: "XSS — the SVG might contain JavaScript that executes when the parsed result is served back to users"
      - c: "Path traversal — the SVG's xlink:href attributes can reference local files"
      - d: "SSRF — the SVG's image references can point to internal network resources"
    answer: "a"
    explanation: "lxml's default parser resolves external entities and processes DTDs. Since SVG is an XML format, an attacker can embed a malicious DTD in the SVG file: `<!DOCTYPE svg [<!ENTITY xxe SYSTEM 'file:///etc/passwd'>]>` and reference `&xxe;` in the SVG content. The fix is `etree.parse(uploaded_file, etree.XMLParser(resolve_entities=False, no_network=True))`. Option B is a valid concern for SVG serving but not related to XML parsing. Option C is a concern when rendering SVGs, not during XML parsing. Option D is also a rendering concern, not a parsing vulnerability."

  - id: xxe-006
    topic: xxe
    type: defense-bypass
    difficulty: advanced
    question: "A developer configures their XML parser to block SYSTEM entities (external file/URL references). They believe this prevents all XXE. What entity type can STILL be used for attacks?"
    options:
      - a: "Parameter entities (defined with % in the DTD) — these are processed differently and may not be blocked by the same setting that blocks general entities"
      - b: "Predefined entities (&amp;, &lt;, etc.) — these can be redefined to point to external resources"
      - c: "Character entities (&#x41;) — these can be chained to construct file:// URIs"
      - d: "Namespace entities — XML namespaces can reference external DTDs that bypass the parser's restrictions"
    answer: "a"
    explanation: "Parameter entities (% entities) are processed within the DTD itself and are sometimes handled by a different code path than general entities. Some parser configurations that disable external general entities still allow external parameter entities. For example, `<!ENTITY % file SYSTEM 'file:///etc/passwd'>` may still work. This is particularly relevant for blind XXE, where parameter entities in an external DTD are used for data exfiltration. Option B is wrong — predefined entities can't be redefined to reference external resources. Option C is wrong — character references are simple character mappings. Option D fabricates a non-existent entity type."

  # ============================================================
  # FILE UPLOAD (6 questions)
  # ============================================================

  - id: upload-001
    topic: file-upload
    type: defense-bypass
    difficulty: advanced
    question: "A file upload feature validates by checking the Content-Type header, the file extension, and the first few bytes (magic number) for image formats. Which technique bypasses ALL THREE checks?"
    options:
      - a: "Upload a polyglot file — a valid JPEG (with correct magic bytes FF D8 FF) that also contains embedded PHP code in a comment section, with a .jpg extension and image/jpeg Content-Type"
      - b: "Rename a PHP file to .jpg — the extension and Content-Type match, and PHP files start with `<?` which is a valid image header"
      - c: "Upload a PHP file with `GIF89a` prepended — this matches the GIF magic bytes, use .gif extension and image/gif Content-Type"
      - d: "Both A and C — polyglot files and magic byte prepending are both valid techniques that bypass triple validation"
    answer: "d"
    explanation: "Both techniques create files that pass all three validation checks. A JPEG polyglot embeds PHP in the EXIF/comment sections of a genuine JPEG. Prepending `GIF89a` to a PHP file creates a file that starts with valid GIF magic bytes. Both use matching extensions and Content-Types. The vulnerability occurs when the web server later interprets these files as PHP (due to misconfiguration or path tricks). Option B is wrong — `<?` is NOT a valid image magic number; image validators check specific byte sequences."

  - id: upload-002
    topic: file-upload
    type: scenario
    difficulty: advanced
    question: "An application stores uploaded files outside the web root and serves them through a download endpoint that sets `Content-Type: application/octet-stream` and `Content-Disposition: attachment`. Is file upload exploitation still possible?"
    options:
      - a: "No — this is the ideal secure configuration; files can't be executed or rendered in the browser"
      - b: "Yes — if the application has a separate image rendering endpoint that reads the stored file and serves it inline for preview functionality"
      - c: "Yes — browsers ignore Content-Disposition on some file types and render them inline regardless"
      - d: "Yes — the Content-Type can be overridden by the browser based on file extension sniffing"
    answer: "b"
    explanation: "The base configuration is strong, but applications often have additional features (image thumbnails, document preview, avatar display) that serve the same uploaded files with different headers — potentially inline with a Content-Type derived from the file. These secondary serving paths can re-introduce execution/rendering risks. Option A would be correct if this were the ONLY serving path. Option C is wrong — browsers respect Content-Disposition: attachment for downloads. Option D is wrong — browsers don't sniff Content-Type when explicit headers are set (especially with X-Content-Type-Options: nosniff)."

  - id: upload-003
    topic: file-upload
    type: defense-bypass
    difficulty: advanced
    question: "An Apache web server allows file uploads. The application blocks .php, .php3, .php5, .phtml, and .phar extensions. What upload can STILL achieve PHP execution?"
    options:
      - a: "Upload a .htaccess file containing `AddType application/x-httpd-php .txt` — this makes Apache execute .txt files as PHP in that directory"
      - b: "Upload with the extension .PHP (uppercase) — Apache extension matching is case-sensitive on Linux"
      - c: "Upload with a double extension: `shell.php.jpg` — Apache executes the first recognized extension"
      - d: "Upload a .pHP file — PHP's extension handling is case-insensitive even though the filesystem isn't"
    answer: "a"
    explanation: "Uploading a .htaccess file is devastating — it reconfigures Apache for that directory. `AddType application/x-httpd-php .txt` makes Apache pass .txt files to the PHP interpreter, so a previously-uploaded innocent.txt containing PHP code now executes. Option B is wrong — while Linux filesystems are case-sensitive, Apache's handler mapping for PHP is typically case-insensitive in modern configurations. Option C is wrong — Apache uses the LAST extension, not the first, for handler selection. Option D is wrong for the same reason as B."

  - id: upload-004
    topic: file-upload
    type: tricky-concept
    difficulty: advanced
    question: "A web application resizes uploaded images using ImageMagick before storing them. The developer believes this neutralizes any embedded malicious content. What are they missing?"
    options:
      - a: "ImageMagick has a history of critical RCE vulnerabilities (ImageTragick/CVE-2016-3714) where specially crafted images trigger command execution during processing"
      - b: "Image resizing preserves EXIF metadata, which can contain executable JavaScript that runs when the image is viewed"
      - c: "The resized image's pixel data can encode a PHP webshell that survives the transformation"
      - d: "Resizing temporarily creates the original file on disk, and a race condition allows accessing it before it's replaced"
    answer: "a"
    explanation: "ImageMagick's ImageTragick vulnerability (and similar bugs) allow remote code execution through specially crafted image files. ImageMagick supports many file formats and uses external delegates (like ffmpeg, ghostscript) to process them. Malicious SVG, MVG, or other format files can trigger command execution during the resize operation — before any sanitization occurs. Option B is wrong — EXIF JavaScript doesn't execute in modern browsers (it's not an execution context). Option C is theoretically possible but extremely unlikely to survive resampling. Option D is possible but the primary risk is RCE during processing, not a race condition."

  - id: upload-005
    topic: file-upload
    type: scenario
    difficulty: intermediate
    question: "An application checks file uploads by: 1) verifying the extension is .png, 2) verifying Content-Type is image/png, 3) using the `file` command to verify the file type. An attacker uploads a file named `test.png` that passes all checks. Two hours later, a web shell appears on the server. How?"
    options:
      - a: "The PNG contained steganographic data that another server process decoded into a PHP file"
      - b: "A separate Local File Inclusion (LFI) vulnerability on the server includes the PNG file as PHP — the PHP interpreter ignores the PNG header and executes any PHP code embedded in the file"
      - c: "The attacker exploited a race condition between upload and validation — the unvalidated file was accessible for a brief window"
      - d: "The PNG's EXIF data contained a cron job specification that the server's monitoring tool parsed and executed"
    answer: "b"
    explanation: "PHP is remarkably tolerant of non-PHP content before `<?php` tags. An LFI vulnerability that includes arbitrary files as PHP (`include('/uploads/test.png')`) will execute any PHP code embedded in the PNG, ignoring the binary image data. The file genuinely is a valid PNG (passing all checks) that also contains PHP code in a comment or metadata section. Option A is overly complex and unlikely. Option C doesn't explain the 2-hour delay. Option D fabricates a behavior that standard monitoring tools don't have."

  - id: upload-006
    topic: file-upload
    type: attack-chain
    difficulty: advanced
    question: "You can upload files to a server, but the upload directory has been configured with PHP execution disabled (via .htaccess or nginx config). All direct execution vectors are blocked. What is the MOST effective remaining attack?"
    options:
      - a: "Upload an SVG file containing JavaScript — if the server serves SVGs with their correct MIME type, the JS executes in viewers' browsers (stored XSS)"
      - b: "Upload a file larger than the disk quota to cause a denial of service"
      - c: "Upload a file with a very long name to cause a buffer overflow in the filesystem"
      - d: "Upload a ZIP bomb — a small file that expands to massive size if the server attempts to extract it"
    answer: "a"
    explanation: "Even without server-side code execution, uploaded SVG files containing `<script>alert(document.cookie)</script>` create stored XSS if served with `Content-Type: image/svg+xml`. Any user who views the SVG (e.g., as an avatar or attached image) executes the JavaScript in their browser. Option B is possible but lower impact and easily mitigated by file size limits. Option C doesn't cause buffer overflows in modern filesystems. Option D is real but requires the server to extract the archive, which isn't guaranteed."

  # ============================================================
  # BUSINESS LOGIC (6 questions)
  # ============================================================

  - id: logic-001
    topic: business-logic
    type: scenario
    difficulty: advanced
    question: "An e-commerce site applies discount coupons using this flow: add items to cart, apply coupon code, proceed to checkout, pay. The coupon reduces the total by 20%. A race condition is suspected. What specific exploit achieves the most benefit?"
    options:
      - a: "Apply the same coupon multiple times concurrently — if the 'coupon already used' check is not atomic, multiple discount applications can succeed before the flag is set"
      - b: "Add items to the cart concurrently from two sessions — the cart total calculation will be confused"
      - c: "Start checkout in two browser tabs simultaneously — both might create separate orders for the same cart"
      - d: "Apply the coupon and immediately remove items from the cart — the discount persists on the reduced total"
    answer: "a"
    explanation: "The classic coupon race condition: sending multiple concurrent 'apply coupon' requests can succeed before the database marks the coupon as used. If the check-then-mark isn't atomic (using a database transaction with proper isolation), multiple requests pass the 'coupon unused' check simultaneously, each applying the 20% discount. With enough concurrent requests, the total could be reduced to nearly zero. Option B is unlikely to cause calculation errors in properly-designed cart systems. Option C is possible but typically results in duplicate charges, not discounts. Option D describes a logic flaw, not a race condition."

  - id: logic-002
    topic: business-logic
    type: defense-bypass
    difficulty: intermediate
    question: "An online store validates that quantity values are positive integers. A tester enters -5 for quantity and the total becomes negative, resulting in a 'refund' on checkout. The developer adds a check: `if quantity < 1: reject`. What edge case STILL works?"
    options:
      - a: "Decimal values like 0.001 — the quantity passes the `< 1` check but might be rounded down to 0 during price calculation, or exploited for rounding errors"
      - b: "Very large quantities like 99999999 — this causes an integer overflow that wraps to a negative total"
      - c: "The string 'NaN' — JavaScript comparisons with NaN are always false, so `NaN < 1` is false and bypasses the check"
      - d: "All of the above exploit different type handling weaknesses in the same validation logic"
    answer: "d"
    explanation: "All three exploit weak type validation. Decimals (0.001) might be accepted but cause rounding issues in financial calculations. Integer overflow (99999999 * price) can wrap to negative in languages with fixed-width integers. NaN bypasses numeric comparisons because NaN is not less than, equal to, or greater than any value. The robust fix is strict type validation (must be integer), range validation (reasonable min AND max), and server-side recalculation of all totals."

  - id: logic-003
    topic: business-logic
    type: tricky-concept
    difficulty: advanced
    question: "A money transfer feature deducts from the sender and adds to the recipient in two separate database operations (not a transaction). An attacker times a request to trigger a failure between the deduction and the addition. What happens?"
    options:
      - a: "The sender's balance is deducted but the recipient never receives the funds — the money disappears from the system"
      - b: "The system automatically rolls back both operations because databases always maintain consistency"
      - c: "The recipient receives the money twice because the retry logic runs the addition again"
      - d: "Both balances remain unchanged because the application catches the error and reverses the deduction"
    answer: "a"
    explanation: "Without a database transaction wrapping both operations, a failure between the deduction and the addition leaves the system in an inconsistent state: money is removed from the sender but never added to the recipient. Option B describes transactional behavior which the question explicitly states is NOT used. Option C depends on the retry logic implementation — and poorly-designed retry logic could indeed cause double-crediting, but the question asks about the failure itself. Option D assumes perfect error handling which contradicts the premise that these are separate non-transactional operations."

  - id: logic-004
    topic: business-logic
    type: scenario
    difficulty: advanced
    question: "A gift card system allows purchasing a $100 card and sending it to any email. The card can be redeemed for store credit. An attacker buys a gift card, sends it to themselves, redeems it, then initiates a chargeback on the original purchase. What is the business logic flaw?"
    options:
      - a: "The gift card value should be revoked when a chargeback is filed — the system doesn't link chargebacks to redeemed gift cards"
      - b: "Gift cards should require the recipient to verify their identity before redemption"
      - c: "The chargeback will fail because the credit card company can see the gift card was legitimately purchased"
      - d: "The system should require a waiting period between purchase and redemption to allow chargeback processing"
    answer: "a"
    explanation: "The core flaw is that the gift card system and the payment system are disconnected. When a chargeback occurs, the payment is reversed but the gift card credit remains in the attacker's account — they essentially got free store credit. The fix requires linking gift card redemptions to the original payment and automatically revoking card value when chargebacks are filed. Option B adds friction but doesn't prevent the self-send attack. Option C is wrong — chargebacks are often granted regardless. Option D adds delay but doesn't prevent the eventual exploit."

  - id: logic-005
    topic: business-logic
    type: spot-the-vuln
    difficulty: intermediate
    question: "A hotel booking system shows: Room rate $200/night, 3-night minimum. The API accepts this JSON:\n```json\n{\"room_id\": 5, \"check_in\": \"2025-03-01\", \"check_out\": \"2025-03-04\", \"rate\": 200}\n```\nWhat is the business logic vulnerability?"
    options:
      - a: "The client sends the rate — an attacker can change `rate` to 1, paying $3 instead of $600 for a 3-night stay"
      - b: "The dates aren't validated — an attacker could set check_out before check_in for a negative-duration stay"
      - c: "The room_id is directly accessible — an attacker could book any room regardless of availability"
      - d: "All three are business logic vulnerabilities in this API design"
    answer: "d"
    explanation: "All three represent classic business logic flaws. Option A (price manipulation): The server should NEVER trust client-supplied pricing — the rate should be calculated server-side from the room and date. Option B (date logic): Negative or zero duration stays could result in refunds or free stays. Option C (IDOR): The room_id should be validated against availability and authorization. Each flaw is individually exploitable and together they represent a thoroughly insecure booking API."

  - id: logic-006
    topic: business-logic
    type: attack-chain
    difficulty: advanced
    question: "A cryptocurrency exchange allows trading between BTC, ETH, and USD with prices displayed to 8 decimal places. The exchange truncates (not rounds) calculations at 2 decimal places for USD amounts. An attacker makes thousands of tiny trades. What are they exploiting?"
    options:
      - a: "Rounding/truncation arbitrage — each trade loses a fraction of a cent from the exchange due to truncation, and the attacker can accumulate these fractions across thousands of trades"
      - b: "The attacker is performing wash trading to inflate their trading volume and earn loyalty tier benefits"
      - c: "High-frequency trading to front-run other users' orders using the exchange's API latency"
      - d: "The tiny trades overwhelm the exchange's order-matching engine, causing it to crash and enabling exploitation during recovery"
    answer: "a"
    explanation: "Currency rounding/truncation exploitation (also known as salami slicing) accumulates tiny rounding differences across many transactions. For example, if 0.00001 BTC costs $0.009 but truncation makes it $0.00, the attacker gets free fractions of BTC on each trade. Over thousands of trades, these fractions add up to significant value. The fix is to use exact arithmetic (no truncation during calculation) and apply rounding only on final settlement, or to set minimum trade values above the truncation threshold. Option B describes a different market manipulation tactic. Option C describes front-running which is latency-based. Option D describes a DoS attack."
