    icon: flame
    criteria: { type: streak, days: 100 }

  # ── STYLE ───────────────────────────────────────────────
  - id: no-training-wheels
    name: "No Training Wheels"
    description: "Complete 10 labs without using any hints"
    category: style
    tier: silver
    icon: brain
    criteria: { type: labs_without_hints, count: 10 }

  - id: speed-demon
    name: "Speed Demon"
    description: "Log 3 labs in a single day"
