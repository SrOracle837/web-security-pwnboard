# Achievement Definitions
# Each achievement has an id, name, description, category, tier (bronze/silver/gold), and criteria

achievements:
  # ── PROGRESSION ─────────────────────────────────────────
  - id: first-blood
    name: "First Blood"
    description: "Complete your very first lab"
    category: progression
    tier: bronze
    icon: drop
    criteria: { type: total_labs, count: 1 }

  - id: getting-started
    name: "Getting Started"
    description: "Complete 10 labs"
    category: progression
    tier: bronze
    icon: rocket
    criteria: { type: total_labs, count: 10 }

  - id: making-progress
    name: "Making Progress"
    description: "Complete 25 labs"
    category: progression
    tier: silver
    icon: chart
    criteria: { type: total_labs, count: 25 }

  - id: halfway-there
    name: "Halfway There"
    description: "Complete 100 labs"
    category: progression
    tier: gold
    icon: flag
    criteria: { type: total_labs, count: 100 }

  - id: completionist
    name: "Completionist"
    description: "Complete every single lab"
    category: progression
    tier: gold
    icon: crown
    criteria: { type: all_labs_complete }

  - id: bscp-ready
    name: "BSCP Ready"
    description: "Complete all Apprentice and Practitioner labs"
    category: progression
    tier: gold
    icon: certificate
    criteria: { type: all_apprentice_and_practitioner_complete }

  - id: level-5
    name: "Rising Threat"
    description: "Reach Level 5"
    category: progression
    tier: bronze
    icon: arrow-up
    criteria: { type: min_level, level: 5 }

  - id: level-10
    name: "Red Team Material"
    description: "Reach Level 10"
    category: progression
    tier: silver
    icon: shield
    criteria: { type: min_level, level: 10 }

  - id: level-15
    name: "Legendary"
    description: "Reach Level 15 — Pentest Legend"
    category: progression
    tier: gold
    icon: star
    criteria: { type: min_level, level: 15 }

  # ── STREAKS ─────────────────────────────────────────────
  - id: consistent
    name: "Consistent"
    description: "Maintain a 3-day streak"
    category: streaks
    tier: bronze
    icon: flame
    criteria: { type: streak, days: 3 }

  - id: dedicated
    name: "Dedicated"
    description: "Maintain a 7-day streak"
